<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Graveyard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'parchment': '#f1e5c5', 'ink': '#2c1e16', 'blood': '#7a1b1b', 'gold': '#c5a059', 'wood': '#1a110b' }, fontFamily: { 'serif': ['Lora', 'serif'], 'heading': ['Cinzel', 'serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Lora', serif; background-color: #1a110b; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%232c1e16' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E"); color: #f1e5c5; overflow-x: hidden; }
        .parchment-bg { background-color: #f1e5c5; background-image: radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.3) 100%), url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.4), 0 10px 30px rgba(0,0,0,0.7); border: 2px solid #c5a059; color: #2c1e16; }
        .fantasy-btn { background: linear-gradient(to bottom, #8a2b2b, #5a1111); color: #f1e5c5 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2) !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .fantasy-btn:hover { background: linear-gradient(to bottom, #a33232, #7a1b1b); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.6) !important; border-color: #e8cd87 !important; }
        .fantasy-btn-alt { background: linear-gradient(to bottom, #2c1e16, #1a110b); color: #c5a059 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; }
        .fantasy-btn-alt:hover { background: linear-gradient(to bottom, #3d2a1f, #2c1e16); color: #f1e5c5 !important; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.6) !important; }
        .card { transition: all 0.2s; position: relative; border: 1px solid #555; background-color: rgba(0,0,0,0.7); }
        .nav-link { color: #888; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; cursor: pointer; text-decoration: none; white-space: nowrap; font-family: 'Cinzel', serif; }
        .nav-link.active { color: #c5a059; border-bottom: 2px solid #c5a059; padding-bottom: 4px; text-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }
        .nav-link:hover { color: #f1e5c5; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c1e16; border: 1px solid #c5a059; color: #f1e5c5; padding: 12px 24px; border-radius: 4px; z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-family: 'Cinzel', serif; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 800; padding: 20px; backdrop-filter: blur(4px); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div id="toast" class="toast">Message</div>

    <!-- Initial Loading State -->
    <div id="initial-loading" class="flex flex-col items-center justify-center h-screen fade-in w-full text-center">
        <i class="fa-solid fa-ghost fa-bounce text-6xl text-gray-500 mb-6"></i>
        <h2 class="font-heading text-2xl text-parchment animate-pulse">Entering the Catacombs...</h2>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="min-h-screen p-4 md:p-8 hidden w-full">
        <div class="max-w-6xl mx-auto">
            <!-- HEADER & NAVIGATION -->
            <header class="flex flex-col items-center md:items-start md:flex-row justify-between mb-8 border-b border-gray-700 pb-6 gap-6 relative">
                <div class="absolute -bottom-1.5 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-gray-700 to-transparent opacity-50"></div>
                
                <div class="text-center md:text-left w-full md:w-auto">
                    <h1 id="campaign-title" class="text-4xl md:text-5xl text-gray-400 font-bold mb-1 font-heading tracking-tight leading-none drop-shadow-md">Chronicles</h1>
                    <div class="flex flex-col md:flex-row items-center gap-3 mt-2">
                        <p class="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold font-heading">The Graveyard</p>
                        <div class="bg-black bg-opacity-60 border border-gray-700 px-3 py-1 rounded flex items-center gap-2 shadow-inner">
                            <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span>
                            <span id="user-display-name" class="text-[10px] font-black text-gray-400 uppercase tracking-widest font-heading">Guest</span>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-end gap-4 w-full md:w-auto mt-4 md:mt-0">
                    <div class="flex items-center gap-4">
                        <button onclick="try { window.location.href='campaigns.html' } catch(e) { window.showToast('Redirects disabled in preview.') }" class="fantasy-btn-alt px-4 py-1.5 text-xs rounded !border-gray-600 !text-gray-400 hover:!text-white"><i class="fa-solid fa-arrow-left mr-2"></i>Nexus</button>
                    </div>

                    <nav id="main-nav" class="flex gap-4 md:gap-6 items-center w-full overflow-x-auto scrollbar-hide pb-2 px-2 md:px-0 md:pb-0 justify-start md:justify-end mt-2">
                        <a href="#" onclick="window.routeTo('characters.html'); return false;" class="nav-link">Party</a>
                        <a href="#" onclick="window.routeTo('npcs.html'); return false;" class="nav-link">NPCs</a>
                        <a href="#" onclick="window.routeTo('beasts.html'); return false;" class="nav-link">Bestiary</a>
                        <a href="#" onclick="window.routeTo('backpack.html'); return false;" class="nav-link">Backpack</a>
                        <a href="#" onclick="window.routeTo('handbook.html'); return false;" class="nav-link">Handbook</a>
                        <a href="#" onclick="window.routeTo('graveyard.html'); return false;" class="nav-link active !text-gray-400 !border-gray-500">Graveyard</a>
                    </nav>
                </div>
            </header>

            <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                <h2 class="text-xl md:text-2xl font-heading text-gray-500 uppercase font-bold tracking-widest drop-shadow">Fallen Heroes & Foes</h2>
            </div>

            <div id="graveyard-view-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- Tombstones will populate here -->
            </div>
        </div>
    </div>

    <!-- RESURRECTION/DELETE MODAL (DM ONLY) -->
    <div id="manage-dead-modal" class="modal-overlay hidden z-[800]">
        <div class="parchment-bg rounded-lg max-w-sm w-full p-8 shadow-2xl border-2 border-blood">
            <h2 class="font-heading text-2xl font-bold text-blood text-center mb-2 border-b border-blood pb-2">Manage Soul</h2>
            <h3 id="manage-soul-name" class="font-heading text-lg text-ink text-center mb-6 uppercase tracking-wider">Unknown</h3>
            
            <div class="space-y-4">
                <button onclick="window.resurrectCharacter()" class="w-full py-3 bg-green-800 text-parchment border border-green-600 rounded font-heading font-bold uppercase text-xs shadow">Resurrect / Awaken</button>
                <button onclick="window.permDeleteCharacter()" class="w-full py-3 bg-transparent text-blood border-2 border-blood hover:bg-blood hover:text-parchment rounded font-heading font-bold uppercase text-xs transition-colors">Permanently Delete</button>
            </div>
            
            <div class="text-center mt-6">
                <button onclick="document.getElementById('manage-dead-modal').classList.add('hidden')" class="text-xs font-bold text-gray-600 uppercase tracking-widest hover:text-ink font-heading underline">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, deleteDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // --- CORE UI FUNCTIONS ---
        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            if(t){ t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 4000); } 
        };

        window.routeTo = (page) => {
            const currentId = new URLSearchParams(window.location.search).get('id');
            try {
                if (currentId && currentId !== "demo_campaign") {
                    window.location.href = `${page}?id=${currentId}`;
                } else {
                    window.location.href = page;
                }
            } catch(e) {
                window.showToast("Redirects disabled in preview window.");
            }
        };

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CAMPAIGN SCOPING ---
        const urlParams = new URLSearchParams(window.location.search);
        let appId = urlParams.get('id') || urlParams.get('campaignId');
        const isPreviewEnv = window.location.href.startsWith('blob:') || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (!appId) {
            if (isPreviewEnv) {
                appId = "demo_campaign";
            } else {
                try { window.location.href = "campaigns.html"; } catch(e) {}
            }
        }

        let currentUser = null;
        let deadCharacters = [];
        let selectedSoulId = null;

        // --- RENDER LOGIC ---
        function renderGraveyard() {
            const container = document.getElementById('graveyard-view-container');
            if (!container) return;
            container.innerHTML = '';

            if (deadCharacters.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-16 border border-dashed border-gray-700 rounded bg-black bg-opacity-30">
                        <i class="fa-solid fa-wind text-5xl mb-4 text-gray-700"></i>
                        <h4 class="text-sm font-bold text-gray-500 uppercase tracking-[0.2em] mb-2 font-heading">The Tombs are Empty</h4>
                        <p class="text-xs text-gray-600 max-w-xs mx-auto font-serif italic">No souls have perished in this realm... yet.</p>
                    </div>`;
                return;
            }

            const isDM = currentUser && currentUser.role === 'dm';

            deadCharacters.forEach(c => {
                const mediaSrc = c.imageSrc 
                    ? `<img src="${c.imageSrc}" class="w-full h-full object-cover filter grayscale opacity-60">` 
                    : `<div class="w-full h-full flex items-center justify-center text-3xl text-gray-600"><i class="fa-solid fa-skull"></i></div>`;
                
                const d = document.createElement('div'); 
                d.className = `bg-black bg-opacity-80 rounded card flex flex-col overflow-hidden`;
                
                const dmManageBtn = isDM ? `<button onclick="window.openSoulManager('${c.id}', '${c.name}')" class="mt-3 w-full bg-gray-800 hover:bg-gray-700 text-gray-300 py-1.5 rounded text-[9px] font-bold uppercase tracking-widest transition-colors border border-gray-600 font-heading">Manage Soul</button>` : '';

                d.innerHTML = `
                    <div class="p-4 md:p-5 relative flex-grow">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded bg-black bg-opacity-50 border border-gray-700 overflow-hidden relative shrink-0">${mediaSrc}</div>
                            <div class="flex-grow min-w-0">
                                <h5 class="text-gray-400 font-heading font-bold text-sm md:text-base leading-tight truncate tracking-wider">${c.name || 'Unknown'}</h5>
                                <p class="text-[10px] text-gray-600 uppercase tracking-widest mt-0.5 font-serif italic">Fallen ${c.class || 'Adventurer'} Lvl ${c.level || 1}</p>
                                ${dmManageBtn}
                            </div>
                        </div>
                    </div>
                `;
                container.appendChild(d);
            });
        }

        // --- DM SOUL MANAGEMENT ---
        window.openSoulManager = (id, name) => {
            if (!currentUser || currentUser.role !== 'dm') return;
            selectedSoulId = id;
            document.getElementById('manage-soul-name').textContent = name;
            document.getElementById('manage-dead-modal').classList.remove('hidden');
        };

        window.resurrectCharacter = async () => {
            if (!selectedSoulId || currentUser?.role !== 'dm') return;
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'characters', selectedSoulId), { 
                    isDeleted: false, 
                    status: 'alive', 
                    comaActive: false,
                    hpCurrent: 1, // Resurrect with 1 HP
                    dsSucc: 0,
                    dsFail: 0
                });
                window.showToast("Soul Returned to the Living.");
                document.getElementById('manage-dead-modal').classList.add('hidden');
            } catch (e) {
                window.showToast("Resurrection Failed.");
            }
        };

        window.permDeleteCharacter = async () => {
            if (!selectedSoulId || currentUser?.role !== 'dm') return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'characters', selectedSoulId));
                window.showToast("Soul Erased Permanently.");
                document.getElementById('manage-dead-modal').classList.add('hidden');
            } catch (e) {
                window.showToast("Deletion Failed.");
            }
        };

        // --- GLOBAL AUTHENTICATION SYNC ---
        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                try { window.location.href = "index.html"; } catch(e) {
                    document.getElementById('initial-loading').innerHTML = `<i class="fa-solid fa-triangle-exclamation text-6xl text-blood mb-6"></i><h2 class="font-heading text-2xl text-blood">Authentication Required</h2>`;
                }
                return;
            }
            
            try {
                if (u.isAnonymous) {
                    currentUser = { uid: u.uid, username: "Guest Traveler", role: 'player' };
                } else {
                    const userDoc = await getDoc(doc(db, 'users', u.uid));
                    if (userDoc.exists()) {
                        currentUser = { uid: u.uid, ...userDoc.data() };
                    } else {
                        currentUser = { uid: u.uid, username: u.displayName || 'Traveler', role: 'player' };
                    }
                }

                document.getElementById('user-display-name').innerText = currentUser.username;
                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');

                // NEW: Fetch and set the dynamic campaign name
                try {
                    const campSnap = await getDoc(doc(db, 'campaigns', appId));
                    if (campSnap.exists() && campSnap.data().name) {
                        document.getElementById('campaign-title').textContent = campSnap.data().name;
                        document.title = campSnap.data().name + " - Graveyard"; // Updates the browser tab too!
                    }
                } catch (err) {
                    console.log("Could not load campaign title:", err);
                }

                // Attach Database Listener specific to Graveyard
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'characters'), (snap) => { 
                    // Only keep characters that are marked as deleted OR dead
                    deadCharacters = snap.docs
                        .map(d => ({id: d.id, ...d.data()}))
                        .filter(c => c.isDeleted === true || c.status === 'dead');
                    renderGraveyard(); 
                });

            } catch (error) {
                document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Database Access Denied</h2>`;
            }
        });
    </script>
</body>
</html>
