            theme: {
                extend: {
                    colors: {
                        'parchment': '#f1e5c5',

    <style>
        body {
            background-color: #0a0604; /* Dark abyss */
            color: #2c1e16;
            margin: 0;
            overflow: hidden; /* Lock scrolling for cinematic feel */
        }

        /* --- Cinematic Background Elements --- */
        .ambient-fog {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 60% 30%, rgba(197, 160, 89, 0.08) 0%, transparent 60%),
                        radial-gradient(circle at 50% 80%, rgba(122, 27, 27, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: 2;
        }

        .scanlines {
            position: absolute;
            inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%);
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 5;
            opacity: 0.35;
        }

        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, transparent 20%, rgba(10, 6, 4, 0.95) 100%);
            pointer-events: none;
            z-index: 4;
        }

        .pattern-overlay {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%23c5a059' fill-opacity='0.05' fill-rule='evenodd'/%3E%3C/svg%3E");
            z-index: 3;
            pointer-events: none;
        }

        /* --- Campfire & Embers --- */
        @keyframes fireGlow {
            0%, 100% { filter: drop-shadow(0 0 10px rgba(197, 160, 89, 0.5)) saturate(1.2); transform: scale(1); }
            50% { filter: drop-shadow(0 0 20px rgba(122, 27, 27, 0.8)) saturate(1.5); transform: scale(1.05); }
        }
        .campfire-core {
            animation: fireGlow 2s infinite ease-in-out;
        }

        .ember {
            position: absolute;
            bottom: 12%;
            width: 4px;
            height: 4px;
            background: #c5a059;
            border-radius: 50%;
            box-shadow: 0 0 8px 2px #7a1b1b;
            opacity: 0;
            animation: floatUp 4s infinite ease-in;
            z-index: 3;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-250px) translateX(30px) scale(0.3); opacity: 0; }
        }
        .ember:nth-child(1) { right: 39%; animation-duration: 3s; animation-delay: 0s; }
        .ember:nth-child(2) { right: 41%; animation-duration: 4.5s; animation-delay: 1.2s; }
        .ember:nth-child(3) { right: 38%; animation-duration: 3.5s; animation-delay: 2.1s; }
        .ember:nth-child(4) { right: 40.5%; animation-duration: 5s; animation-delay: 0.5s; }
        .ember:nth-child(5) { right: 39.5%; animation-duration: 3.8s; animation-delay: 3s; }

        /* --- Title Glow --- */
        .intro-title-glow {
            text-shadow: 0 0 20px rgba(197, 160, 89, 0.4), 0 0 40px rgba(122, 27, 27, 0.6);
            letter-spacing: 0.1em;
        }

        /* --- Existing Parchment Theme --- */
        .parchment-bg {
            background-color: #f1e5c5;
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.3) 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.4), 0 10px 40px rgba(0,0,0,0.8);
            border: 2px solid #c5a059;
            border-radius: 4px;
        }

        .fantasy-btn {
            background: linear-gradient(to bottom, #8a2b2b, #5a1111);
            color: #f1e5c5;
            border: 2px solid #c5a059;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2);
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .fantasy-btn:hover {
            background: linear-gradient(to bottom, #a33232, #7a1b1b);
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
            border-color: #e8cd87;
        }
        
        .fantasy-btn-intro {
            background: transparent;
            color: #c5a059;
            border: 2px solid #c5a059;
            font-family: 'Cinzel', serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.4s ease;
            box-shadow: 0 0 15px rgba(197, 160, 89, 0.2), inset 0 0 10px rgba(197, 160, 89, 0.1);
            text-shadow: 0 0 8px rgba(197, 160, 89, 0.5);
            backdrop-filter: blur(4px);
        }

        .fantasy-btn-intro:hover {
            background: rgba(122, 27, 27, 0.4);
            color: #f1e5c5;
            border-color: #f1e5c5;
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(122, 27, 27, 0.8), inset 0 0 15px rgba(122, 27, 27, 0.5);
        }

        .fantasy-input {
            background-color: rgba(255, 255, 255, 0.4);
            border: 1px solid #8b5a2b;
            border-bottom: 2px solid #c5a059;
            color: #2c1e16;
            font-family: 'Lora', serif;
            transition: all 0.3s;
        }

        .fantasy-input:focus {
            outline: none;
            background-color: rgba(255, 255, 255, 0.7);
            border-bottom-color: #8a2b2b;
        }

        .ornamental-hr {
            border: 0;
            height: 2px;
            background-image: linear-gradient(to right, rgba(197, 160, 89, 0), rgba(197, 160, 89, 0.8), rgba(197, 160, 89, 0));
            margin: 20px 0;
            position: relative;
        }
        
        .ornamental-hr::after {
            content: "♦";
            position: absolute;
            top: -10px;
            left: 50%;
            transform: translateX(-50%);
            color: #c5a059;
            font-size: 16px;
        }

        /* --- Animations --- */
        .fade-in { animation: fadeIn 1s ease-in forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .fade-out { animation: fadeOut 0.8s ease-out forwards; }
        @keyframes fadeOut { from { opacity: 1; transform: scale(1); } to { opacity: 0; transform: scale(1.05); visibility: hidden; pointer-events: none; } }

        .slide-up { animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>

    <script>
        // Global State variables
        window.currentAuthMode = 'login';

        window.enterGame = function() {
            const introView = document.getElementById('intro-view');
            const authView = document.getElementById('auth-view');

            // Initiate the visual screen transition
            introView.classList.remove('fade-in');
            introView.classList.add('fade-out');

            setTimeout(() => {
                introView.classList.add('hidden');
                authView.classList.remove('hidden');
                authView.classList.add('slide-up');
            }, 600);
        };

        window.switchAuthTab = function(mode) {
            window.currentAuthMode = mode;
            
            const btnLogin = document.getElementById('tab-login');
            const btnRegister = document.getElementById('tab-register');
            const registerFields = document.getElementById('register-fields');
            const submitBtn = document.getElementById('auth-submit-btn');

            if (mode === 'login') {
                btnLogin.className = "flex-1 py-2 font-heading font-bold text-blood border-b-4 border-blood";
                btnRegister.className = "flex-1 py-2 font-heading font-bold text-ink hover:text-blood transition";
                registerFields.classList.add('hidden');
                submitBtn.innerText = "Enter the Realm";
            } else {
                btnRegister.className = "flex-1 py-2 font-heading font-bold text-blood border-b-4 border-blood";
                btnLogin.className = "flex-1 py-2 font-heading font-bold text-ink hover:text-blood transition";
                registerFields.classList.remove('hidden');
                submitBtn.innerText = "Forge Account";
                
                registerFields.classList.add('slide-up');
                setTimeout(() => registerFields.classList.remove('slide-up'), 600);
            }
        };

        window.showModal = function(title, message) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-message').innerText = message;
            document.getElementById('modal-container').classList.remove('hidden');
        };
    </script>

    <script type="module">

        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInAnonymously, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e",
            measurementId: "G-71DW54NTWV"
        };

        const app = initializeApp(firebaseConfig);
        
        let analytics;
        try {
            analytics = getAnalytics(app);
        } catch(e) {
            console.log("Analytics blocked by client.");
        }
        
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.logoutAuth = () => {
            signOut(auth).then(() => window.location.reload());
        };

        // --- AUTHENTICATION STATE OBSERVER ---
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    window.location.href = "campaigns.html";
                } catch(e) {
                    let display = user.displayName || "Traveler";
                    try {
                        const snap = await getDoc(doc(db, 'users', user.uid));
                        if(snap.exists() && snap.data().username) display = snap.data().username;
                    } catch(err) {}

                    document.getElementById('initial-loading').classList.add('hidden');
                    document.getElementById('auth-view').innerHTML = `
                        <div class="parchment-bg p-10 text-center shadow-2xl border-2 border-gold rounded-lg max-w-sm">
                            <h2 class="text-blood font-heading text-2xl mb-4 font-bold">Welcome Back, ${display}!</h2>
                            <p class="text-ink font-serif text-sm">Because you are viewing this in a preview window, automatic redirects are disabled.<br><br>Please manually open <b>campaigns.html</b> to continue.</p>
                            <button onclick="window.logoutAuth()" class="mt-6 text-xs text-blood font-bold uppercase tracking-widest hover:underline font-heading">Switch Account / Log Out</button>
                        </div>
                    `;
                    document.getElementById('auth-view').classList.remove('hidden');
                    document.getElementById('auth-view').classList.add('fade-in');
                }
            } else {
                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('intro-view').classList.remove('hidden');
                document.getElementById('intro-view').classList.add('fade-in');
            }
        });

        // Handle DM Secret visibility
        document.querySelectorAll('input[name="auth-role"]').forEach(radio => {
            radio.addEventListener('change', (e) => {
                document.getElementById('dm-secret-container').classList.toggle('hidden', e.target.value !== 'dm');
            });
        });

        // Handle Guest Sign-In
        document.getElementById('btn-guest-signin').addEventListener('click', async () => {
            const submitBtn = document.getElementById('btn-guest-signin');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = "<i class='fa-solid fa-spinner fa-spin mr-2'></i>Opening Gates...";
            submitBtn.disabled = true;

            try {
                await signInAnonymously(auth);
            } catch (error) {
                console.error("Guest Auth Error:", error);
                window.showModal("Error", "Failed to enter as guest. " + error.message);
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // Handle Login/Register Submission
        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value.trim();
            
            if(!email || !password) return window.showModal("Hold!", "Email and password are required.");
            
            const submitBtn = document.getElementById('auth-submit-btn');
            submitBtn.innerText = "Entering the Realm...";
            submitBtn.disabled = true;

            try {
                if (window.currentAuthMode === 'register') {
                    const role = document.querySelector('input[name="auth-role"]:checked').value;
                    const dmSecret = document.getElementById('auth-dm-secret').value.trim();
                    
                    if (role === 'dm' && !dmSecret) {
                        submitBtn.innerText = "Forge Account";
                        submitBtn.disabled = false;
                        return window.showModal("Hold!", "A Dungeon Master must set a Sanctum password.");
                    }

                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;

                    await setDoc(doc(db, 'users', user.uid), {
                        username: '',
                        email: email,
                        role: role,
                        dmSecret: role === 'dm' ? dmSecret : null,
                        createdAt: new Date().toISOString()
                    });
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                console.error("Auth Error:", error);
                submitBtn.disabled = false;
                submitBtn.innerText = window.currentAuthMode === 'login' ? "Enter the Realm" : "Forge Account";
                
                if(error.code === 'auth/email-already-in-use') {
                    window.showModal("Access Denied", "That email is already claimed by another traveler.");
                } else if (error.code === 'auth/invalid-credential') {
                    window.showModal("Access Denied", "Incorrect email or passphrase.");
                } else {
                    window.showModal("Error", error.message);
                }
            }
        });
    </script>
</body>
</html>
