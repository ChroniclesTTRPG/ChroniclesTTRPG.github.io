<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronicles - How to Play</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'parchment': '#f1e5c5',
                        'ink': '#2c1e16',
                        'blood': '#7a1b1b',
                        'gold': '#c5a059',
                        'wood': '#1a110b',
                        'stone': '#e8e0cd'
                    },
                    fontFamily: {
                        'serif': ['Lora', 'serif'],
                        'heading': ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Lora', serif; 
            background-color: #1a110b; 
            color: #2c1e16;
            margin: 0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1a110b; }
        ::-webkit-scrollbar-thumb { background: #7a1b1b; border-radius: 4px; border: 1px solid #c5a059; }

        /* The App Container */
        .tome-container { display: flex; min-height: 100vh; width: 100%; }

        /* Sidebar Styling (Dark Wood) */
        .tome-sidebar {
            width: 320px;
            background-color: #1a110b;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%232c1e16' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
            border-right: 4px solid #c5a059;
            box-shadow: 10px 0 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 50;
        }

        .shelf-item { font-family: 'Cinzel', serif; font-size: 12px; font-weight: 900; text-transform: uppercase; padding: 16px 24px; margin: 4px 16px; cursor: pointer; border-radius: 4px; transition: 0.2s; border-left: 3px solid transparent; color: #c5a059; letter-spacing: 1px; }
        .shelf-item:hover { background: rgba(122, 27, 27, 0.2); border-left-color: #7a1b1b; color: #f1e5c5; transform: translateX(4px); }

        /* Main Body (Parchment Paper) */
        .tome-body {
            flex-grow: 1;
            background-color: #f1e5c5;
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.2) 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            padding: 60px 80px 160px 80px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        /* Typography */
        .manual-body [contenteditable], .manual-body [contenteditable] * { color: #2c1e16 !important; }
        .arch-link, .definition-word { color: #7a1b1b !important; }
        
        .manual-h1 { font-family: 'Cinzel', serif; font-weight: 900; font-size: 3.5rem; text-transform: uppercase; color: #1a110b; text-align: center; border-bottom: 2px solid #c5a059; padding-bottom: 10px; margin-bottom: 10px; letter-spacing: 2px; }
        .manual-subtitle { font-family: 'Cinzel', serif; font-weight: 700; font-size: 14px; text-transform: uppercase; letter-spacing: 0.3em; color: #7a1b1b; text-align: center; margin-bottom: 40px; }
        
        .manual-h2 { font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.5rem; border-bottom: 4px double #c5a059; padding-bottom: 10px; text-transform: uppercase; margin: 60px 0 20px 0; width: 100%; display: block; color: #1a110b; letter-spacing: 1px; }
        .manual-h3 { font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.5rem; border-bottom: 1px dashed #c5a059; padding-bottom: 5px; text-transform: uppercase; margin: 30px 0 15px 0; width: 100%; display: block; color: #7a1b1b; }
        
        .text-block { font-family: 'Lora', serif; font-size: 1.1rem; line-height: 1.8; color: #2c1e16; }

        /* Storybook Boxes */
        .manual-note-box { background: rgba(255, 255, 255, 0.4); border: 1px solid #c5a059; border-left: 6px solid #7a1b1b; border-radius: 4px 12px 12px 4px; padding: 30px; margin: 30px 0; font-family: 'Lora', serif; font-style: italic; box-shadow: 0 4px 15px rgba(139, 90, 43, 0.1); }
        .manual-info-box { background: rgba(122, 27, 27, 0.05); border: 2px solid #c5a059; border-radius: 8px; padding: 30px; margin: 30px 0; box-shadow: inset 0 0 20px rgba(139, 90, 43, 0.1); }

        /* DM Editing Modes */
        .dm-editable { outline: none; min-height: 1.2em; transition: background 0.2s ease; }
        .dm-mode-active .dm-editable:hover { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
        .dm-editable:focus { background: rgba(255, 255, 255, 0.7) !important; box-shadow: inset 0 0 0 2px #c5a059; border-radius: 8px; padding: 8px; }
        .aeon-style-span { display: inline; line-height: 1.4; }

        /* Interactive Elements */
        .definition-word { border-bottom: 2px dotted #c5a059; cursor: help; position: relative; font-weight: 700; color: #7a1b1b; }
        .definition-word::after { content: attr(data-definition); position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%) translateY(5px); background: #1a110b; color: #f1e5c5; padding: 8px 12px; border-radius: 6px; border: 1px solid #c5a059; font-family: 'Lora', serif; font-size: 13px; font-weight: 400; line-height: 1.4; width: max-content; max-width: 250px; text-align: center; z-index: 1000; box-shadow: 0 10px 25px rgba(0,0,0,0.8); pointer-events: none; opacity: 0; visibility: hidden; transition: all 0.2s ease; }
        .definition-word::before { content: ''; position: absolute; bottom: calc(100% + 2px); left: 50%; transform: translateX(-50%) translateY(5px); border-width: 6px; border-style: solid; border-color: #c5a059 transparent transparent transparent; z-index: 1001; pointer-events: none; opacity: 0; visibility: hidden; transition: all 0.2s ease; }
        .definition-word:hover::after, .definition-word:hover::before { opacity: 1; visibility: visible; transform: translateX(-50%) translateY(0); }
        
        .arch-link { text-decoration: underline; text-decoration-style: double; text-decoration-color: #c5a059; font-weight: 700; transition: 0.2s; color: #7a1b1b; }
        .arch-link:hover { background: rgba(197, 160, 89, 0.2); }

        /* Media & Carousels */
        .inline-img-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; margin: 40px 0; }
        .inline-img-container { position: relative; display: inline-block; max-width: 100%; }
        .img-del-btn { position: absolute; top: -10px; right: -10px; background: #7a1b1b; color: white !important; width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; cursor: pointer; border: 2px solid #c5a059; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 50; transition: 0.2s; }
        
        .adaptive-carousel { position: relative; width: 100%; background: rgba(255, 255, 255, 0.2); border: 4px solid #c5a059; outline: 1px solid #1a110b; border-radius: 8px; overflow: hidden; box-shadow: 0 20px 40px rgba(139, 90, 43, 0.2); margin: 40px 0; }
        .carousel-viewport { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 250px; }
        .carousel-slide { display: none; width: 100%; padding: 40px; text-align: center; }
        .carousel-slide.active { display: flex; flex-direction: column; align-items: center; justify-content: center; animation: slideFade 0.4s ease; }
        .carousel-img { max-width: 100%; max-height: 70vh; height: auto; object-fit: contain; border-radius: 4px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); cursor: zoom-in; }
        .carousel-caption { margin-top: 20px; font-family: 'Lora', serif; font-style: italic; font-size: 14px; color: #2c1e16; max-width: 80%; }
        
        @keyframes slideFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* Tables */
        .table-wrap { width: 100%; overflow-x: auto; background: rgba(255,255,255,0.4); border: 2px solid #c5a059; border-radius: 8px; box-shadow: 0 10px 20px rgba(139, 90, 43, 0.1); margin: 30px 0; }
        .manual-table { width: 100%; border-collapse: collapse; text-align: left; font-family: 'Lora', serif; }
        .manual-table th { background: rgba(139, 90, 43, 0.2); padding: 16px; border-bottom: 2px solid #7a1b1b; font-weight: 900; font-family: 'Cinzel', serif; color: #7a1b1b; text-transform: uppercase; }
        .manual-table td { padding: 14px 16px; border-bottom: 1px dashed rgba(139, 90, 43, 0.3); font-size: 15px; color: #2c1e16; }
        .manual-table tr:nth-child(even) { background-color: rgba(255,255,255,0.2); }

        /* DM Toolbars */
        #dm-global-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; padding: 12px 24px; background: #1a110b; border-radius: 8px; border: 2px solid #c5a059; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 10000; align-items: center; }
        #dm-global-controls.dm-active { display: flex; }
        
        .arch-btn { font-family: 'Cinzel', serif; font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 10px 18px; border-radius: 4px; cursor: pointer; border: 1px solid #c5a059; background: #2c1e16; color: #c5a059 !important; transition: 0.2s; }
        .arch-btn:hover { background: #7a1b1b; color: #f1e5c5 !important; border-color: #f1e5c5; }
        .sync-btn { background: #7a1b1b !important; color: #f1e5c5 !important; border-color: #f1e5c5 !important; }

        .tuner-panel { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; padding: 10px; background: #1a110b; border-radius: 8px; border: 1px solid #c5a059; box-shadow: 0 10px 25px rgba(0,0,0,0.5); position: relative; z-index: 10; }
        .format-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; cursor: pointer; background: #2c1e16; color: #c5a059; border: 1px solid transparent; }
        .format-btn:hover { background: #3d2a1f; border-color: #c5a059; }
        .format-btn.active { background: #7a1b1b !important; color: #f1e5c5 !important; }
        .insert-menu-btn { width: 30px; height: 30px; background: #2c1e16; color: #c5a059; border: 1px solid #c5a059; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .insert-dropdown { position: absolute; top: 110%; left: 0; background: #1a110b; border: 1px solid #c5a059; border-radius: 4px; padding: 6px; display: none; z-index: 100; min-width: 120px; }
        .insert-menu-btn:focus-within .insert-dropdown { display: block; }
        .insert-option { padding: 8px 12px; font-size: 10px; font-weight: 700; text-transform: uppercase; color: #f1e5c5; cursor: pointer; font-family: 'Cinzel', serif; }
        .insert-option:hover { background: #7a1b1b; }

        .manual-section-unit.unit-dragging { opacity: 0.2 !important; transform: scale(0.97); transition: 0.2s; }
        .drop-zone-top { border-top: 6px solid #7a1b1b !important; }
        .drop-zone-bottom { border-bottom: 6px solid #7a1b1b !important; }

        /* Modals & UI */
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c1e16; border: 1px solid #c5a059; color: #f1e5c5; padding: 12px 24px; border-radius: 4px; z-index: 200000; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-family: 'Cinzel', serif; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 150000; padding: 20px; backdrop-filter: blur(4px); }
        
        .fantasy-btn { background: linear-gradient(to bottom, #8a2b2b, #5a1111); color: #f1e5c5 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .fantasy-btn:hover { background: linear-gradient(to bottom, #a33232, #7a1b1b); border-color: #f1e5c5 !important; }
        .fantasy-btn-alt { background: transparent; color: #2c1e16 !important; border: 2px solid #2c1e16 !important; font-family: 'Cinzel', serif; text-transform: uppercase; font-weight: bold; transition: all 0.2s ease; }
        .fantasy-btn-alt:hover { background: #2c1e16; color: #f1e5c5 !important; }

        @media (max-width: 1024px) {
            .tome-container { flex-direction: column; }
            .tome-sidebar { width: 100%; height: auto; position: relative; border-right: none; border-bottom: 4px solid #c5a059; padding-bottom: 20px; }
            .tome-body { padding: 40px 20px 140px 20px; }
            .manual-h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body onclick="window.clearSelectionState(event)">

    <div id="toast" class="toast">Message</div>

    <div id="initial-loading" class="fixed inset-0 bg-[#1a110b] flex flex-col items-center justify-center z-[200000] transition-opacity duration-500">
        <i class="fa-solid fa-book-open fa-bounce text-6xl text-gold mb-6"></i>
        <h2 class="font-heading font-bold text-2xl text-parchment uppercase tracking-widest">Opening the Tome...</h2>
    </div>

    <div id="lightbox-modal" class="hidden fixed inset-0 z-[120000] bg-black/95 flex items-center justify-center cursor-zoom-out" onclick="this.classList.add('hidden')">
        <div id="lightbox-content" class="p-4 flex items-center justify-center w-full h-full"></div>
    </div>

    <!-- PURGE MODAL -->
    <div id="purge-modal" class="modal-overlay hidden">
        <div class="bg-[#f1e5c5] p-8 max-w-sm w-full text-center border-2 border-[#7a1b1b] shadow-2xl rounded">
            <h3 class="font-heading font-black text-2xl text-[#7a1b1b] uppercase tracking-widest mb-2">Purge Record</h3>
            <p id="purge-text" class="font-serif italic text-ink mb-6 text-sm">Purge archival segment?</p>
            <div class="flex flex-col gap-3 font-heading">
                <button id="purge-confirm" class="w-full bg-[#7a1b1b] text-[#f1e5c5] py-3 rounded border border-[#c5a059] font-bold uppercase text-xs shadow hover:bg-red-800 transition-colors">Confirm Erasure</button>
                <button onclick="window.closePurgeModal()" class="w-full bg-transparent text-[#2c1e16] border border-[#2c1e16] py-3 rounded font-bold uppercase text-xs hover:bg-[#2c1e16] hover:text-[#f1e5c5] transition-colors">Cancel</button>
            </div>
        </div>
    </div>

    <div class="tome-container">
        <!-- SIDEBAR -->
        <div class="tome-sidebar">
            <div class="text-center p-8 pb-4">
                <h1 id="campaign-title-display" class="font-heading font-black text-3xl text-gold uppercase leading-none tracking-widest drop-shadow-md">Chronicles</h1>
                <p class="font-heading text-[10px] uppercase font-bold tracking-[0.2em] text-gray-400 mt-2">Operational Manual</p>
            </div>
            
            <div id="nav-list" class="flex-grow overflow-y-auto mt-4 px-2">
                <!-- Headings inject here -->
            </div>
            
            <div class="p-4 mt-auto border-t border-gray-700/50">
                <button onclick="window.returnToDash()" class="w-full text-center py-3 text-gold border border-gold rounded font-heading font-black text-xs uppercase tracking-widest hover:bg-gold hover:text-ink transition-colors">← Return to Handbook</button>
            </div>
        </div>

        <!-- MAIN BODY -->
        <div class="tome-body manual-body">
            <div id="manual-header" class="mb-12"></div>
            <div id="manual-sections-container" class="flex flex-wrap items-start gap-4"></div>
            
            <!-- DM CONTROLS -->
            <div id="dm-global-controls">
                <button onmousedown="event.preventDefault(); window.addManualSection('heading')" class="arch-btn"><i class="fa-solid fa-heading mr-1"></i> Heading</button>
                <button onmousedown="event.preventDefault(); window.addManualSection('subheading')" class="arch-btn"><i class="fa-solid fa-list mr-1"></i> Sub</button>
                <button onmousedown="event.preventDefault(); window.addManualSection('text')" class="arch-btn"><i class="fa-solid fa-paragraph mr-1"></i> Text</button>
                <button onmousedown="event.preventDefault(); window.addManualSection('table')" class="arch-btn"><i class="fa-solid fa-table mr-1"></i> Table</button>
                <button onmousedown="event.preventDefault(); window.addManualSection('note')" class="arch-btn"><i class="fa-solid fa-quote-right mr-1"></i> Note</button>
                <button onmousedown="event.preventDefault(); window.addManualSection('info')" class="arch-btn"><i class="fa-solid fa-scroll mr-1"></i> Info</button>
                <button onmousedown="event.preventDefault(); window.addManualSection('media')" class="arch-btn"><i class="fa-solid fa-image mr-1"></i> Image</button>
                <div class="w-px h-6 bg-gold mx-1"></div>
                <button onmousedown="event.preventDefault(); window.forceSync()" class="arch-btn sync-btn"><i class="fa-solid fa-bolt mr-1"></i> SYNC</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, setDoc, onSnapshot, addDoc, deleteDoc, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CAMPAIGN & PAGE SCOPING ---
        const urlParams = new URLSearchParams(window.location.search);
        let appId = urlParams.get('id') || urlParams.get('campaignId');
        const isPreviewEnv = window.location.href.startsWith('blob:') || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (!appId) {
            if (isPreviewEnv) { appId = "demo_campaign"; } 
            else { try { window.location.href = "campaigns.html"; } catch(e) {} }
        }

        // Determine which specific handbook page we are on based on the filename!
        // (If you duplicate this file and name it 'worldlore.html', pageId becomes 'worldlore')
        let pageId = window.location.pathname.split('/').pop().replace('.html', '');
        if (!pageId || pageId === "" || pageId === "index") pageId = "howtoplay"; // Default
        
        const DB_COLLECTION = `manualSections_${pageId}`;

        // Return to Dashboard
        window.returnToDash = () => {
            try { window.location.href = `handbook.html?id=${appId}`; } 
            catch(e) { window.showToast("Redirects disabled in preview."); }
        };

        // --- HANDBOOK STATE & LOGIC ---
        let currentUser = null;
        let activeRole = 'player';
        
        window.aeonState = {
            sections: [],
            header: { title: "THE ARCHIVES", subtitle: "A compendium of knowledge." },
            activeEditId: null,
            lastActiveId: null,
            lockedSelection: null,
            saveTimer: null,
            draggedId: null,
            dropSide: null,
            isInteracting: false,
            activeSlides: {}
        };

        window.showToast = (msg) => {
            const t = document.getElementById('toast');
            if (t) { t.innerText = msg; t.style.opacity = 1; setTimeout(() => t.style.opacity = 0, 3000); }
        };

        window.renderNav = () => {
            const nav = document.getElementById('nav-list');
            if (!nav) return;
            nav.innerHTML = window.aeonState.sections.filter(s => s.type === 'heading').map(s => `
                <div class="shelf-item" onclick="const el=document.getElementById('section-${s.id}'); if(el) el.scrollIntoView({behavior:'smooth'})">${s.title}</div>
            `).join('');
        };

        window.updateRoleUI = () => {
            const isDM = activeRole === 'dm';
            document.body.classList.toggle('dm-mode-active', isDM);
            const controls = document.getElementById('dm-global-controls');
            if (controls) controls.classList.toggle('dm-active', isDM);
            window.renderManual();
        };

        window.handlePaste = (e) => {
            e.preventDefault();
            const text = (e.originalEvent || e).clipboardData.getData('text/plain');
            document.execCommand('insertText', false, text);
        };

        window.parseContent = (text, isDM, id) => {
            if (!text) return '';
            
            let p = text;
            
            // Clean up existing data-definitions that might have inherited hidden HTML tags
            p = p.replace(/data-definition="([^"]*)"/gi, (match, defVal) => {
                let cleanDef = defVal.replace(/&lt;.*?&gt;|<[^>]+>/g, '').replace(/&nbsp;/g, ' ').trim();
                return `data-definition="${cleanDef}"`;
            });

            // Self-healing for old titles, stripping out tags just in case
            p = p.replace(/(<span[^>]*class="definition-word"[^>]*)\btitle="([^"]*)"/gi, (match, p1, p2) => {
                let clean = p2.replace(/&lt;.*?&gt;|<[^>]+>/g, '').replace(/&nbsp;/g, ' ').trim();
                return p1 + 'data-definition="' + clean + '"';
            });
            p = p.replace(/(<span[^>]*)\btitle="([^"]*)"([^>]*class="definition-word"[^>]*>)/gi, (match, p1, p2, p3) => {

        window.removeSlide = async (sid, i) => { if (activeRole !== 'dm') return; const s = window.aeonState.sections.find(x => x.id === sid); let u = (s.mediaUrl || "").split(',').filter(x => x.trim()); let ds = (s.mediaDescription || "").split(','); u.splice(i,1); ds.splice(i,1); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, sid), { mediaUrl: u.join(','), mediaDescription: ds.join(',') }); };
        window.removeInlineImage = (sid, url) => { if (activeRole !== 'dm') return; const s = window.aeonState.sections.find(x => x.id === sid); const reg = new RegExp(`\\{\\{\\s*${url.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\s*(\\|[^}]*)?\\}\\}`, 'g'); window.dbUpdateSection(sid, 'content', s.content.replace(reg, '')); };
        window.openZoom = (url) => { const modal = document.getElementById('lightbox-modal'); const content = document.getElementById('lightbox-content'); content.innerHTML = `<img src="${url}" class="max-w-[95vw] max-h-[90vh] object-contain shadow-2xl border-2 border-gold rounded">`; modal.classList.remove('hidden'); };

        // --- AUTHENTICATION SYNC ---
        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                try { window.location.href = "index.html"; } catch(e) {
                    document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Authentication Required</h2>`;
                }
                return;
            }
            
            try {
                if (u.isAnonymous) {
                    currentUser = { uid: u.uid, username: "Guest Traveler", role: 'player' };
                } else {
                    const userDoc = await getDoc(doc(db, 'users', u.uid));
                    if (userDoc.exists()) {
                        currentUser = { uid: u.uid, ...userDoc.data() };
                    } else {
                        currentUser = { uid: u.uid, username: u.displayName || 'Traveler', role: 'player' };
                    }
                }

                activeRole = currentUser.role || 'player';

                // Fetch campaign name
                if (appId !== "demo_campaign") {
                    const campDoc = await getDoc(doc(db, 'campaigns', appId));
                    if (campDoc.exists() && campDoc.data().name) {
                        const titleEl = document.getElementById('main-campaign-title');
                        if (titleEl) titleEl.innerText = campDoc.data().name;
                        document.title = `${campDoc.data().name} - Tome`;
                    }
                }

                const userDisplay = document.getElementById('user-display-name');
                if (userDisplay) userDisplay.innerText = currentUser.username;
                
                // Toggle DM Features & UI
                window.updateRoleUI();

                const initLoad = document.getElementById('initial-loading');
                if (initLoad) initLoad.classList.add('hidden');
                
                // Listen for manual configuration (Title/Subtitle)
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'manualConfig', `header_${pageId}`), d => {
                    if (d.exists()) { window.aeonState.header = d.data(); window.renderManual(); }
                }, err => console.error("Header Listen Error:", err));

                // Listen for manual sections for THIS specific page
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), snap => {
                    window.aeonState.sections = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0) - (b.order||0));
                    if (!window.aeonState.activeEditId && !window.aeonState.isInteracting) {
                        window.renderManual(); 
                    } else {
                        window.renderNav(); 
                    }
                }, err => console.error("Sections Sync Error:", err));

            } catch (error) {
                console.error("Initialization Error:", error);
                const initLoad = document.getElementById('initial-loading');
                if (initLoad) {
                    initLoad.innerHTML = `<h2 class="font-heading text-2xl text-blood">Connection Failed</h2><p class="text-xs text-gray-400 mt-2">${error.message}</p>`;
                }
            }
        });
    </script>
</body>
</html>
