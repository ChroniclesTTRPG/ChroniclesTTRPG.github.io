<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronicles - Handbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'parchment': '#f1e5c5',
                        'ink': '#2c1e16',
                        'blood': '#7a1b1b',
                        'gold': '#c5a059',
                        'wood': '#1a110b',
                        'stone': '#e8e0cd'
                    },
                    fontFamily: {
                        'serif': ['Lora', 'serif'],
                        'heading': ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Lora', serif; background-color: #1a110b; color: #2c1e16; overflow-x: hidden; 
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%232c1e16' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        
        .dashboard-bg { background-color: transparent; }
        
        .parchment-paper {
            background-color: #f1e5c5;
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.3) 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.4), 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #c5a059;
            color: #2c1e16;
            border-radius: 4px;
        }
        
        .fantasy-btn { background: linear-gradient(to bottom, #8a2b2b, #5a1111); color: #f1e5c5 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2) !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .fantasy-btn:hover { background: linear-gradient(to bottom, #a33232, #7a1b1b); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.6) !important; border-color: #e8cd87 !important; }
        
        .fantasy-btn-alt { background: linear-gradient(to bottom, #2c1e16, #1a110b); color: #c5a059 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; }
        .fantasy-btn-alt:hover { background: linear-gradient(to bottom, #3d2a1f, #2c1e16); color: #f1e5c5 !important; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.6) !important; }

        .nav-link { color: #888; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; cursor: pointer; text-decoration: none; white-space: nowrap; font-family: 'Cinzel', serif; }
        .nav-link.active { color: #c5a059; border-bottom: 2px solid #c5a059; padding-bottom: 4px; text-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }
        .nav-link:hover { color: #f1e5c5; }

        /* HANDBOOK SPECIFIC STYLES */
        .manual-body [contenteditable], .manual-body [contenteditable] * { color: #2c1e16 !important; }
        .arch-link, .definition-word { color: #7a1b1b !important; }
        
        .manual-h2 { font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.5rem; border-bottom: 3px double #c5a059; padding-bottom: 10px; text-transform: uppercase; margin: 40px 0 20px 0; width: 100%; display: block; color: #7a1b1b; }
        .manual-h3 { font-family: 'Cinzel', serif; font-weight: 700; font-size: 1.5rem; border-bottom: 1px solid rgba(139, 90, 43, 0.3); padding-bottom: 5px; text-transform: uppercase; margin: 25px 0 15px 0; width: 100%; display: block; color: #2c1e16; }

        .dm-editable { outline: none; min-height: 1.2em; transition: background 0.2s ease; }
        .dm-mode-active .dm-editable:hover { background: rgba(255,255,255,0.4); border-radius: 4px; }
        .dm-editable:focus { background: rgba(255, 255, 255, 0.6) !important; box-shadow: inset 0 0 0 1px #c5a059; border-radius: 8px; padding: 4px; }

        .definition-word { border-bottom: 2px dotted #c5a059; cursor: help; position: relative; font-weight: 700; }
        .arch-link { text-decoration: underline; text-decoration-style: double; text-decoration-color: #c5a059; font-weight: 700; transition: 0.2s; }

        .manual-note-box, .manual-info-box { border: 2px solid #c5a059; border-radius: 8px; padding: 30px; margin-bottom: 30px; position: relative; background: rgba(255,255,255,0.4); box-shadow: inset 0 0 20px rgba(139,90,43,0.1); }
        .manual-note-box { background: rgba(122, 27, 27, 0.05) !important; border-color: #7a1b1b; }

        .adaptive-carousel { position: relative; width: 100%; background: rgba(255,255,255,0.4); border: 2px solid #c5a059; border-radius: 8px; overflow: hidden; margin: 30px 0; }
        .carousel-viewport { position: relative; width: 100%; display: flex; align-items: center; justify-content: center; min-height: 250px; }
        .carousel-slide { display: none; width: 100%; padding: 40px; text-align: center; }
        .carousel-slide.active { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .carousel-img { max-width: 100%; max-height: 60vh; height: auto; object-fit: contain; border-radius: 4px; border: 1px solid #c5a059; cursor: zoom-in; }
        .carousel-nav { position: absolute; top: 50%; transform: translateY(-50%); background: #1a110b; color: #c5a059; width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid #c5a059; z-index: 20; }
        
        .table-wrap { width: 100%; overflow-x: auto; background: rgba(255,255,255,0.4); border: 2px solid #c5a059; border-radius: 8px; margin-bottom: 30px; }
        .manual-table { width: 100%; border-collapse: collapse; text-align: left; }
        .manual-table th { background: rgba(139,90,43,0.2); padding: 16px; border-bottom: 2px solid #7a1b1b; font-family: 'Cinzel', serif; font-weight: 900; color: #7a1b1b; text-transform: uppercase; }
        .manual-table td { padding: 14px 16px; border-bottom: 1px dashed rgba(139,90,43,0.3); font-size: 14px; }

        #dm-global-controls { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: none; gap: 8px; padding: 10px 20px; background: #1a110b; border-radius: 8px; border: 2px solid #c5a059; box-shadow: 0 20px 50px rgba(0,0,0,0.8); z-index: 10000; align-items: center; }
        #dm-global-controls.dm-active { display: flex; }
        
        .tuner-panel { display: flex; align-items: center; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; padding: 10px; background: #1a110b; border-radius: 8px; border: 1px solid #c5a059; position: relative; z-index: 10; }
        .tuner-select, .tuner-num-input { background: #2c1e16; border: 1px solid #c5a059; color: #f1e5c5; font-size: 10px; padding: 4px; border-radius: 4px; font-family: 'Cinzel', serif; outline: none; }
        .format-btn { width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: bold; cursor: pointer; background: #2c1e16; color: #c5a059; border: 1px solid transparent; }
        .format-btn.active { background: #7a1b1b !important; color: #f1e5c5 !important; }
        
        .table-tool-btn { font-size: 9px; font-weight: 900; background: #2c1e16; color: #c5a059; padding: 4px 8px; border-radius: 4px; border: 1px solid #c5a059; cursor: pointer; text-transform: uppercase; font-family: 'Cinzel', serif; }
        
        .insert-menu-btn { width: 30px; height: 30px; background: #2c1e16; color: #c5a059; border: 1px solid #c5a059; border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
        .insert-dropdown { position: absolute; top: 110%; left: 0; background: #1a110b; border: 1px solid #c5a059; border-radius: 4px; padding: 6px; display: none; z-index: 100; min-width: 120px; }
        .insert-menu-btn:focus-within .insert-dropdown { display: block; }
        .insert-option { padding: 8px 12px; font-size: 9px; font-weight: 700; text-transform: uppercase; color: #f1e5c5; cursor: pointer; font-family: 'Cinzel', serif; }
        .insert-option:hover { background: #7a1b1b; }

        .manual-section-unit.unit-dragging { opacity: 0.2 !important; transform: scale(0.97); transition: 0.2s; }
        
        .sidebar-link { display: block; padding: 12px 16px; margin-bottom: 8px; border-radius: 4px; font-family: 'Cinzel', serif; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; color: #f1e5c5; background: rgba(0,0,0,0.4); border: 1px solid #555; transition: all 0.2s; }
        .sidebar-link:hover { background: rgba(0,0,0,0.8); border-color: #c5a059; transform: translateX(4px); }
        .sidebar-link.active-page { background: #7a1b1b; border-color: #c5a059; color: white; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c1e16; border: 1px solid #c5a059; color: #f1e5c5; padding: 12px 24px; border-radius: 4px; z-index: 100000; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-family: 'Cinzel', serif; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 200000; padding: 20px; backdrop-filter: blur(4px); }
        
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
        .hidden-view { display: none !important; }
        
        /* Custom scrollbar for modal */
        .modal-scroll::-webkit-scrollbar { width: 6px; }
        .modal-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #c5a059; border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div id="toast" class="toast">Message</div>

    <!-- Initial Loading State -->
    <div id="initial-loading" class="flex flex-col items-center justify-center h-screen fade-in w-full text-center">
        <i class="fa-solid fa-compass fa-spin text-6xl text-gold mb-6"></i>
        <h2 class="font-heading text-2xl text-parchment animate-pulse">Charting the Tomes...</h2>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="min-h-screen p-4 md:p-8 hidden w-full">
        <div class="max-w-[1400px] mx-auto">
            <!-- HEADER & NAVIGATION -->
            <header class="flex flex-col items-center md:items-start md:flex-row justify-between mb-8 border-b border-gray-700 pb-6 gap-6 relative">
                <div class="absolute -bottom-1.5 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-gray-700 to-transparent opacity-50"></div>
                
                <div class="text-center md:text-left w-full md:w-auto">
                    <h1 id="main-campaign-title" class="text-4xl md:text-5xl text-gray-400 font-bold mb-1 font-heading tracking-tight leading-none drop-shadow-md">Chronicles</h1>
                    <div class="flex flex-col md:flex-row items-center gap-3 mt-2">
                        <p class="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold font-heading">Campaign Library</p>
                        <div class="bg-black bg-opacity-60 border border-gray-700 px-3 py-1 rounded flex items-center gap-2 shadow-inner">
                            <span class="w-1.5 h-1.5 rounded-full bg-gray-500"></span>
                            <span id="user-display-name" class="text-[10px] font-black text-gray-400 uppercase tracking-widest font-heading">Guest</span>
                            <i id="settings-gear" class="fa-solid fa-gear text-gray-500 hover:text-gold cursor-pointer hidden ml-1" onclick="document.getElementById('terminology-modal').classList.remove('hidden')" title="Archive Terminology"></i>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-end gap-4 w-full md:w-auto mt-4 md:mt-0">
                    <div class="flex items-center gap-4">
                        <button onclick="try { window.location.href='campaigns.html' } catch(e) { window.showToast('Redirects disabled in preview.') }" class="fantasy-btn-alt px-4 py-1.5 text-xs rounded !border-gray-600 !text-gray-400 hover:!text-white"><i class="fa-solid fa-arrow-left mr-2"></i>Nexus</button>
                    </div>

                    <nav id="main-nav" class="flex gap-4 md:gap-6 items-center w-full overflow-x-auto scrollbar-hide pb-2 px-2 md:px-0 md:pb-0 justify-start md:justify-end mt-2">
                        <a href="#" onclick="window.routeTo('characters.html'); return false;" class="nav-link">Party</a>
                        <a href="#" onclick="window.routeTo('npcs.html'); return false;" class="nav-link">NPCs</a>
                        <a href="#" onclick="window.routeTo('beasts.html'); return false;" class="nav-link">Bestiary</a>
                        <a href="#" onclick="window.routeTo('backpack.html'); return false;" class="nav-link">Backpack</a>
                        <a href="#" onclick="window.routeTo('handbook.html'); return false;" class="nav-link active">Handbook</a>
                        <a href="#" onclick="window.routeTo('graveyard.html'); return false;" class="nav-link">Graveyard</a>
                    </nav>
                </div>
            </header>

            <!-- HANDBOOK SPLIT LAYOUT -->
            <div class="flex flex-col lg:flex-row gap-8 items-start">
                
                <!-- LEFT SIDEBAR: Library Navigation -->
                <div class="w-full lg:w-64 flex-shrink-0">
                    <div class="bg-black/60 border border-gray-700 rounded-lg p-4 sticky top-4">
                        <h2 class="text-gold font-heading font-bold text-lg mb-4 text-center border-b border-gray-700 pb-2">The Archives</h2>
                        <nav id="library-nav" class="flex flex-col">
                            <!-- Links generated dynamically by JS based on current page -->
                        </nav>
                    </div>
                </div>

                <!-- RIGHT AREA: The Parchment Document -->
                <div class="flex-grow w-full relative">
                    <div id="page-title-display" class="text-3xl md:text-4xl font-heading font-bold text-gray-400 uppercase tracking-widest mb-6 drop-shadow">Loading Tome...</div>
                    
                    <div class="parchment-paper p-6 md:p-12 min-h-[600px] mb-24" id="content-pane">
                        <div id="manual-sections-container" class="flex flex-wrap items-start gap-4"></div>
                    </div>

                    <!-- DM CONTROLS (Floating at bottom of right area) -->
                    <div id="dm-global-controls">
                        <button onmousedown="event.preventDefault(); window.addManualSection('heading')" class="fantasy-btn-alt px-3 py-1.5 rounded text-[9px] font-bold"><i class="fa-solid fa-heading mr-1"></i> Heading</button>
                        <button onmousedown="event.preventDefault(); window.addManualSection('subheading')" class="fantasy-btn-alt px-3 py-1.5 rounded text-[9px] font-bold"><i class="fa-solid fa-list mr-1"></i> Sub</button>
                        <button onmousedown="event.preventDefault(); window.addManualSection('text')" class="fantasy-btn-alt px-3 py-1.5 rounded text-[9px] font-bold"><i class="fa-solid fa-paragraph mr-1"></i> Text</button>
                        <button onmousedown="event.preventDefault(); window.addManualSection('table')" class="fantasy-btn-alt px-3 py-1.5 rounded text-[9px] font-bold"><i class="fa-solid fa-table mr-1"></i> Table</button>
                        <button onmousedown="event.preventDefault(); window.addManualSection('note')" class="fantasy-btn-alt px-3 py-1.5 rounded text-[9px] font-bold"><i class="fa-solid fa-scroll mr-1"></i> Note</button>
                        <button onmousedown="event.preventDefault(); window.addManualSection('info')" class="fantasy-btn-alt px-3 py-1.5 rounded text-[9px] font-bold"><i class="fa-solid fa-chart-bar mr-1"></i> Info</button>
                        <button onmousedown="event.preventDefault(); window.addManualSection('media')" class="fantasy-btn-alt px-3 py-1.5 rounded text-[9px] font-bold"><i class="fa-solid fa-images mr-1"></i> Carousel</button>
                        <div class="w-px h-6 bg-gold mx-1"></div>
                        <button onmousedown="event.preventDefault(); window.forceSync()" class="fantasy-btn px-4 py-1.5 rounded text-[9px] font-bold">SYNC</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- TERMINOLOGY MODAL -->
    <div id="terminology-modal" class="modal-overlay hidden">
        <div class="parchment-paper p-8 max-w-md w-full border-2 border-gold shadow-2xl">
            <h3 class="font-heading font-black text-2xl text-ink uppercase tracking-widest mb-4 border-b border-gold pb-2">Archive Terminology</h3>
            <p class="font-serif italic text-ink mb-6 text-sm">Rename the chapters of your Archives. (Leave blank for default)</p>
            
            <div class="flex flex-col gap-4 font-heading text-xs max-h-[50vh] overflow-y-auto pr-2 modal-scroll">
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Main Index:</label><input id="term-input-handbook" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Main Index"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">How to Play:</label><input id="term-input-howtoplay" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="How to Play"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Lineages:</label><input id="term-input-lineages" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Lineages"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Backgrounds:</label><input id="term-input-backgrounds" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Backgrounds"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Vocations:</label><input id="term-input-vocations" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Vocations"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Landmarks:</label><input id="term-input-landmarks" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Landmarks"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Script Codex:</label><input id="term-input-script_codex" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Script Codex"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Gear & Artifacts:</label><input id="term-input-gear_artifacts" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Gear & Artifacts"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">World Lore:</label><input id="term-input-worldlore" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="World Lore"></div>
                <div class="flex justify-between items-center"><label class="font-bold w-2/5 text-ink">Session Logs:</label><input id="term-input-sessionlogs" class="w-3/5 bg-transparent border-b border-gray-400 outline-none p-1 text-ink placeholder-gray-500" placeholder="Session Logs"></div>
            </div>

            <div class="flex flex-col gap-3 font-heading mt-6 pt-4 border-t border-gold">
                <button onclick="window.saveTerminology()" class="w-full bg-ink text-parchment py-3 rounded border border-gold font-bold uppercase text-xs shadow transition-colors hover:bg-black">Save Changes</button>
                <button onclick="document.getElementById('terminology-modal').classList.add('hidden')" class="w-full bg-transparent text-ink border border-ink py-3 rounded font-bold uppercase text-xs transition-colors hover:bg-ink hover:text-parchment">Cancel</button>
            </div>
        </div>
    </div>

    <!-- PURGE MODAL -->
    <div id="purge-modal" class="modal-overlay hidden">
        <div class="parchment-paper p-8 max-w-sm w-full text-center border-2 border-blood shadow-2xl">
            <h3 class="font-heading font-black text-2xl text-blood uppercase tracking-widest mb-2">Purge Record</h3>
            <p id="purge-text" class="font-serif italic text-ink mb-6 text-sm">Purge archival segment?</p>
            <div class="flex flex-col gap-3 font-heading">
                <button id="purge-confirm" class="w-full bg-blood text-parchment py-3 rounded border border-gold font-bold uppercase text-xs shadow transition-colors hover:bg-red-800">Confirm Erasure</button>
                <button onclick="document.getElementById('purge-modal').classList.add('hidden')" class="w-full bg-transparent text-ink border border-ink py-3 rounded font-bold uppercase text-xs transition-colors hover:bg-ink hover:text-parchment">Cancel</button>
            </div>
        </div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox-modal" class="modal-overlay hidden cursor-zoom-out" onclick="this.classList.add('hidden')">
        <div id="lightbox-content" class="p-4 flex items-center justify-center w-full h-full"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, setDoc, onSnapshot, addDoc, deleteDoc, writeBatch, getDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // --- CORE UI FUNCTIONS ---
        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            if(t){ t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 4000); } 
        };

        window.routeTo = (page) => {
            const currentId = new URLSearchParams(window.location.search).get('id') || new URLSearchParams(window.location.search).get('campaignId');
            try {

        };

        // Standard helpers
        window.applyStyle = (prop, val) => { if (!val) return; const sel = window.getSelection(); if (window.aeonState.lockedSelection) { sel.removeAllRanges(); sel.addRange(window.aeonState.lockedSelection); } if (!sel.rangeCount || sel.toString().length === 0) return; const range = sel.getRangeAt(0); const span = document.createElement('span'); span.className = 'aeon-style-span'; if (prop === 'fontSize') span.style.fontSize = val + 'px'; if (prop === 'fontFamily') span.style.fontFamily = val; try { span.appendChild(range.extractContents()); range.insertNode(span); const nr = document.createRange(); nr.selectNodeContents(span); sel.removeAllRanges(); sel.addRange(nr); if (window.aeonState.lockedSelection) window.aeonState.lockedSelection = nr.cloneRange(); } catch (e) {} window.saveActiveContent(); };
        window.execFormat = (cmd, val = null) => { const sel = window.getSelection(); if (window.aeonState.lockedSelection) { sel.removeAllRanges(); sel.addRange(window.aeonState.lockedSelection); } document.execCommand(cmd, false, val); window.saveActiveContent(); };
        window.insertTemplate = (type) => { window.execFormat('insertHTML', type === 'img' ? '{{URL | Caption}}' : type === 'def' ? '[[Word | definition]]' : '((Text | URL))'); };
        window.changeSlide = (sid, d) => { const s = window.aeonState.sections.find(x => x.id === sid); const u = (s.mediaUrl || "").split(',').filter(x => x.trim()); window.aeonState.activeSlides[sid] = ((window.aeonState.activeSlides[sid] || 0) + d + u.length) % u.length; window.renderManual(); };
        window.removeSlide = async (sid, i) => { if (activeRole !== 'dm') return; const s = window.aeonState.sections.find(x => x.id === sid); let u = (s.mediaUrl || "").split(',').filter(x => x.trim()); let ds = (s.mediaDescription || "").split(','); u.splice(i,1); ds.splice(i,1); await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, sid), { mediaUrl: u.join(','), mediaDescription: ds.join(',') }); };
        window.removeInlineImage = (sid, url) => { const s = window.aeonState.sections.find(x => x.id === sid); const reg = new RegExp(`\\{\\{\\s*${url.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&')}\\s*(\\|[^}]*)?\\}\\}`, 'g'); window.dbUpdateSection(sid, 'content', s.content.replace(reg, '')); };
        window.openZoom = (url) => { const modal = document.getElementById('lightbox-modal'); const content = document.getElementById('lightbox-content'); content.innerHTML = `<img src="${url}" class="max-w-[95vw] max-h-[90vh] object-contain shadow-2xl border-2 border-gold rounded">`; modal.classList.remove('hidden'); };

        // Drag/Drop implementation
        window.initDrag = (e, id) => { if (activeRole === 'dm') { window.aeonState.draggedId = id; e.currentTarget.classList.add('unit-dragging'); } };
        window.dragOver = (e) => {
            if (!window.aeonState.draggedId) return; e.preventDefault();
            const el = e.currentTarget; const rect = el.getBoundingClientRect();
            const relX = e.clientX - rect.left; const relY = e.clientY - rect.top;
            el.classList.remove('border-t-4', 'border-b-4', 'border-l-4', 'border-r-4', 'border-blood');
            
            const wT = rect.width * 0.20; const hT = rect.height * 0.20; 
            if (relX < wT) { window.aeonState.dropSide = 'left'; el.classList.add('border-l-4', 'border-blood'); }
            else if (relX > rect.width - wT) { window.aeonState.dropSide = 'right'; el.classList.add('border-r-4', 'border-blood'); }
            else if (relY < hT) { window.aeonState.dropSide = 'top'; el.classList.add('border-t-4', 'border-blood'); }
            else { window.aeonState.dropSide = 'bottom'; el.classList.add('border-b-4', 'border-blood'); }
        };

        window.handleDrop = async (e, tid) => {
            if (activeRole !== 'dm') return;
            e.preventDefault(); const did = window.aeonState.draggedId; const side = window.aeonState.dropSide; if (!did || did === tid) return;
            const sections = [...window.aeonState.sections]; const di = sections.findIndex(x => x.id === did);
            let toM = [sections[di]]; 
            if (sections[di].type === 'heading') { for (let i = di + 1; i < sections.length; i++) { if (sections[i].type === 'heading') break; toM.push(sections[i]); } }
            const rem = sections.filter(x => !toM.map(m => m.id).includes(x.id)); 
            let ti = rem.findIndex(x => x.id === tid); if (side === 'bottom' || side === 'right') ti++; 
            rem.splice(ti, 0, ...toM);
            const b = writeBatch(db); 
            if (side === 'left' || side === 'right') { 
                toM.forEach(m => b.update(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, m.id), { width: 48 })); 
                b.update(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, tid), { width: 48 }); 
            } else { 
                toM.forEach(m => b.update(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, m.id), { width: 100 })); 
            }
            rem.forEach((x, i) => b.update(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, x.id), { order: i })); 
            await b.commit(); window.aeonState.draggedId = null;
        };

        // --- AUTHENTICATION SYNC ---
        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                try { window.location.href = "index.html"; } catch(e) {
                    document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Authentication Required</h2>`;
                }
                return;
            }
            
            try {
                if (u.isAnonymous) {
                    currentUser = { uid: u.uid, username: "Guest Traveler", role: 'player' };
                } else {
                    const userDoc = await getDoc(doc(db, 'users', u.uid));
                    if (userDoc.exists()) {
                        currentUser = { uid: u.uid, ...userDoc.data() };
                    } else {
                        currentUser = { uid: u.uid, username: u.displayName || 'Traveler', role: 'player' };
                    }
                }

                activeRole = currentUser.role || 'player';

                // Fetch campaign name & terminology using live listener
                if (appId !== "demo_campaign") {
                    onSnapshot(doc(db, 'campaigns', appId), (campDoc) => {
                        if (campDoc.exists()) {
                            const data = campDoc.data();
                            document.getElementById('main-campaign-title').innerText = data.name || "Chronicles";
                            document.title = `${data.name || "Chronicles"} - Handbook`;
                            if(data.terminology) window.applyTerminology(data.terminology);
                        }
                    }, err => console.error("Campaign Sync Error:", err));
                }

                document.getElementById('user-display-name').innerText = currentUser.username;
                
                window.updateRoleUI();

                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');
                
                renderSidebar();

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), snap => {
                    window.aeonState.sections = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0) - (b.order||0));
                    if (!window.aeonState.activeEditId && !window.aeonState.isInteracting) {
                        window.renderManual(); 
                    }
                }, err => console.error("Sections Sync Error:", err));

            } catch (error) {
                console.error(error);
                document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Database Connection Failed</h2>`;
            }
        });

    </script>
</body>
</html>
