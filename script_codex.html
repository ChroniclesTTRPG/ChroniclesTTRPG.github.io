<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronicles - Script Codex</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'parchment': '#f1e5c5',
                        'ink': '#2c1e16',
                        'blood': '#7a1b1b',
                        'gold': '#c5a059',
                        'wood': '#1a110b',
                        'stone': '#e8e0cd'
                    },
                    fontFamily: {
                        'serif': ['Lora', 'serif'],
                        'heading': ['Cinzel', 'serif'],
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Lora', serif; background-color: #1a110b; color: #2c1e16; overflow-x: hidden; 
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%232c1e16' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E");
        }
        
        .dashboard-bg { background-color: transparent; }
        
        .parchment-paper {
            background-color: #f1e5c5;
            background-image: 
                radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.3) 100%),
                url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
            box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.4), 0 10px 30px rgba(0,0,0,0.7);
            border: 2px solid #c5a059;
            color: #2c1e16;
            border-radius: 4px;
        }

        .fantasy-btn { background: linear-gradient(to bottom, #8a2b2b, #5a1111); color: #f1e5c5 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2) !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .fantasy-btn:hover { background: linear-gradient(to bottom, #a33232, #7a1b1b); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.6) !important; border-color: #e8cd87 !important; }
        
        .fantasy-btn-alt { background: linear-gradient(to bottom, #2c1e16, #1a110b); color: #c5a059 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; }
        .fantasy-btn-alt:hover { background: linear-gradient(to bottom, #3d2a1f, #2c1e16); color: #f1e5c5 !important; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.6) !important; }

        .nav-link { color: #888; font-weight: 900; font-size: 12px; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.2s; cursor: pointer; text-decoration: none; white-space: nowrap; font-family: 'Cinzel', serif; }
        .nav-link.active { color: #c5a059; border-bottom: 2px solid #c5a059; padding-bottom: 4px; text-shadow: 0 0 10px rgba(197, 160, 89, 0.5); }
        .nav-link:hover { color: #f1e5c5; }

        .type-toggle-btn { font-size: 12px; font-weight: 900; text-transform: uppercase; background: transparent; color: #888; transition: all 0.2s; font-family: 'Cinzel', serif; border: 1px solid transparent; flex: 1; text-align: center; padding: 10px 0;}
        .type-toggle-btn.active { background: #7a1b1b; color: #f1e5c5; border-color: #c5a059; box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2); text-shadow: 1px 1px 2px rgba(0,0,0,0.8); border-radius: 4px;}
        .type-toggle-btn:hover:not(.active) { color: #c5a059; background: rgba(255,255,255,0.05); border-color: rgba(197, 160, 89, 0.3); border-radius: 4px;}

        .vocation-tab { background: rgba(0,0,0,0.5); border: 1px solid #444; color: #888; font-family: 'Cinzel', serif; font-size: 10px; font-weight: 900; text-transform: uppercase; padding: 6px 12px; border-radius: 4px; transition: all 0.2s; cursor: pointer; letter-spacing: 1px; white-space: nowrap; flex-shrink: 0; }
        .vocation-tab:hover { border-color: #c5a059; color: #c5a059; background: rgba(0,0,0,0.7); }
        .vocation-tab.active { background: #c5a059; color: #1a110b; border-color: #e8cd87; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); z-index: 10;}

        .level-tab { width: 28px; height: 28px; border-radius: 50%; background: #2c1e16; color: #888; border: 1px solid #555; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-weight: 900; font-size: 11px; cursor: pointer; transition: all 0.2s; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); margin: 2px; flex-shrink: 0;}
        .level-tab:hover { background: #3d2a1f; color: #f1e5c5; border-color: #c5a059; }
        .level-tab.active { background: #7a1b1b; color: #f1e5c5; border-color: #c5a059; box-shadow: 0 0 10px rgba(122, 27, 27, 0.8), inset 0 0 5px rgba(255,255,255,0.2); transform: scale(1.1);}

        .level-tab-wide { height: 28px; border-radius: 14px; background: #2c1e16; color: #888; border: 1px solid #555; display: flex; align-items: center; justify-content: center; font-family: 'Cinzel', serif; font-weight: 900; font-size: 11px; cursor: pointer; transition: all 0.2s; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); margin: 2px; flex-shrink: 0; padding: 0 16px; white-space: nowrap;}
        .level-tab-wide:hover { background: #3d2a1f; color: #f1e5c5; border-color: #c5a059; }
        .level-tab-wide.active { background: #7a1b1b; color: #f1e5c5; border-color: #c5a059; box-shadow: 0 0 10px rgba(122, 27, 27, 0.8), inset 0 0 5px rgba(255,255,255,0.2); transform: scale(1.05);}

        .prog-input { width: 100%; background: transparent; border: none; outline: none; border-bottom: 1px dashed transparent; text-align: center; font-family: 'Lora', serif; color: #2c1e16; transition: border-color 0.2s; }
        .prog-input:focus { border-color: rgba(197, 160, 89, 0.5); background: rgba(255,255,255,0.2); }
        .prog-input-left { text-align: left; }

        .script-card { background: rgba(255,255,255,0.4); border: 1px solid rgba(139, 90, 43, 0.4); box-shadow: inset 0 0 15px rgba(255,255,255,0.5), 0 4px 6px rgba(0,0,0,0.1); border-radius: 6px; padding: 20px; display: flex; flex-direction: column; position: relative; transition: all 0.2s; cursor: pointer; }
        .script-card:hover { border-color: #c5a059; box-shadow: inset 0 0 15px rgba(255,255,255,0.5), 0 8px 15px rgba(0,0,0,0.2); transform: translateY(-2px);}
        .script-card:active { transform: translateY(0); }
        .script-title { font-family: 'Cinzel', serif; font-size: 18px; font-weight: 900; color: #7a1b1b; text-transform: uppercase; border-bottom: 2px solid rgba(139, 90, 43, 0.3); padding-bottom: 4px; margin-bottom: 8px; letter-spacing: 1px;}
        .script-meta { font-family: 'Lora', serif; font-style: italic; font-size: 12px; color: #555; margin-bottom: 12px; }
        .script-props { font-family: 'Lora', serif; font-size: 12px; color: #2c1e16; margin-bottom: 16px; background: rgba(139, 90, 43, 0.05); padding: 10px; border-radius: 4px; border: 1px solid rgba(139, 90, 43, 0.1);}
        .script-props li { margin-bottom: 4px; }
        .script-props b { font-weight: 700; color: #1a1a1a; border-bottom: 1px dotted rgba(139, 90, 43, 0.4); }
        .script-desc { font-family: 'Lora', serif; font-size: 13px; color: #2c1e16; line-height: 1.6; margin-bottom: 16px; white-space: pre-wrap; flex-grow: 1;}
        .script-desc b { color: #1a1a1a; font-weight: 700; }
        .script-higher { border-top: 1px dashed rgba(139, 90, 43, 0.3); padding-top: 12px; margin-top: auto; font-family: 'Lora', serif; font-size: 12px; color: #2c1e16; line-height: 1.5; margin-bottom: 12px;}
        .script-higher b { font-weight: 700; border-bottom: 1px dotted rgba(139, 90, 43, 0.4); color: #1a1a1a; }
        .script-lists { font-family: 'Cinzel', serif; font-size: 10px; font-weight: 900; color: #555; border-top: 1px solid rgba(139, 90, 43, 0.2); padding-top: 8px; margin-bottom: 16px;}

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c1e16; border: 1px solid #c5a059; color: #f1e5c5; padding: 12px 24px; border-radius: 4px; z-index: 10000; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-family: 'Cinzel', serif; box-shadow: 0 10px 20px rgba(0,0,0,0.8);}
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 800; padding: 20px; backdrop-filter: blur(4px); }
        .modal-container { background: #f1e5c5; border: 2px solid #c5a059; border-radius: 8px; width: 100%; max-width: 600px; padding: 32px; box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.2), 0 25px 50px -12px rgba(0, 0, 0, 0.8); position: relative; color: #2c1e16; background-image: radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.1) 100%); }
        
        .import-card { background: rgba(0,0,0,0.4); border: 2px solid #555; border-radius: 8px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; color: #e8e0cd; }
        .import-card:hover { border-color: #c5a059; background: rgba(0,0,0,0.6); transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .import-card i { font-size: 3rem; margin-bottom: 15px; color: #c5a059; }

        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }

        /* Draggable Custom Scrollbar */
        .custom-scrollbar { cursor: grab; padding-bottom: 8px; }
        .custom-scrollbar:active { cursor: grabbing; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c5a059; border-radius: 4px; border: 1px solid #1a110b; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #e8cd87; }
        
        input, textarea, select { background: transparent; border: none; font-size: 13px; color: #2c1e16; width: 100%; font-family: 'Lora', serif; }
        input:focus, textarea:focus { outline: none; background-color: rgba(255,255,255,0.6); }
        .form-input { background: rgba(255,255,255,0.5); border: 1px solid rgba(139, 90, 43, 0.4); padding: 8px 12px; border-radius: 4px; transition: border-color 0.2s;}
        .form-input:focus { border-color: #7a1b1b; }
        .tiny-label { font-size: 9px; text-transform: uppercase; color: #555; font-weight: 900; display: block; margin-bottom: 2px; font-family: 'Cinzel', serif;}
        
        .icon-selector-btn { border: 2px solid transparent; border-radius: 4px; padding: 8px; font-size: 20px; color: #888; transition: all 0.2s; cursor: pointer; flex-shrink: 0; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
        .icon-selector-btn:hover { color: #c5a059; background: rgba(255,255,255,0.05); }
        .icon-selector-btn.active { color: #c5a059; border-color: #c5a059; background: rgba(197, 160, 89, 0.2); }
    </style>
</head>
<body class="min-h-screen">

    <div id="toast" class="toast">Message</div>

    <!-- Initial Loading State -->
    <div id="initial-loading" class="flex flex-col items-center justify-center h-screen fade-in w-full text-center">
        <i class="fa-solid fa-compass fa-spin text-6xl text-gold mb-6"></i>
        <h2 class="font-heading text-2xl text-parchment animate-pulse">Consulting the Codex...</h2>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="min-h-screen dashboard-bg p-4 md:p-8 hidden w-full">
        <div class="max-w-7xl mx-auto">
            <!-- HEADER & NAVIGATION -->
            <header class="flex flex-col items-center md:items-start md:flex-row justify-between mb-8 border-b border-gray-700 pb-6 gap-6 relative">
                <div class="absolute -bottom-1.5 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-gray-700 to-transparent opacity-50"></div>
                
                <div class="text-center md:text-left w-full md:w-auto">
                    <h1 id="main-campaign-title-label" class="text-4xl md:text-5xl text-gray-400 font-bold mb-1 font-heading tracking-tight leading-none drop-shadow-md">Script Codex</h1>
                    <div class="flex flex-col md:flex-row items-center gap-3 mt-2">
                        <p class="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold font-heading">Campaign Management Suite</p>
                        <div class="bg-black bg-opacity-60 border border-gray-700 px-3 py-1 rounded flex items-center gap-2 shadow-inner">
                            <span class="w-1.5 h-1.5 rounded-full bg-green-500"></span>
                            <span id="user-display-name" class="text-[10px] font-black text-gray-400 uppercase tracking-widest font-heading">Guest</span>
                            <!-- GEAR ICON FOR DM TERMINOLOGY -->
                            <button id="btn-campaign-settings" onclick="window.openCampaignSettings()" class="hidden ml-2 text-gray-400 hover:text-gold transition-colors" title="Campaign Terminology"><i class="fa-solid fa-gear"></i></button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-end gap-4 w-full md:w-auto mt-4 md:mt-0">
                    <div class="flex items-center gap-4">
                        <button onclick="try { window.location.href='campaigns.html' } catch(e) { window.showToast('Redirects disabled in preview.') }" class="fantasy-btn-alt px-4 py-1.5 text-xs rounded !border-gray-600 !text-gray-400 hover:!text-white"><i class="fa-solid fa-arrow-left mr-2"></i>Nexus</button>
                    </div>

                    <nav id="main-nav" class="flex gap-4 md:gap-6 items-center w-full overflow-x-auto scrollbar-hide pb-2 px-2 md:px-0 md:pb-0 justify-start md:justify-end mt-2">
                        <a href="#" onclick="window.routeTo('characters.html'); return false;" id="nav-party" class="nav-link">Party</a>
                        <a href="#" onclick="window.routeTo('npcs.html'); return false;" id="nav-npcs" class="nav-link">NPCs</a>
                        <a href="#" onclick="window.routeTo('beasts.html'); return false;" id="nav-beasts" class="nav-link">Bestiary</a>
                        <a href="#" onclick="window.routeTo('backpack.html'); return false;" id="nav-backpack" class="nav-link">Backpack</a>
                        <a href="#" onclick="window.routeTo('handbook.html'); return false;" id="nav-handbook" class="nav-link">Handbook</a>
                        <a href="#" onclick="window.routeTo('script_codex.html'); return false;" class="nav-link active">Script Codex</a>
                        <a href="#" onclick="window.routeTo('graveyard.html'); return false;" id="nav-graveyard" class="nav-link">Graveyard</a>
                    </nav>
                </div>
            </header>

            <!-- FILTERS & ACTIONS -->
            <div class="mb-8 space-y-4">
                
                <!-- TOP FILTER TABS (Centered) -->
                <div class="flex justify-center max-w-3xl mx-auto w-full">
                    <div class="flex bg-[rgba(0,0,0,0.5)] p-1 rounded-lg border border-[rgba(139,90,43,0.4)] shadow-inner w-full">
                        <button id="type-toggle-all" onclick="window.setMainTypeFilter('All')" class="type-toggle-btn active" data-term="nav_all_records">All Records</button>
                        <button id="type-toggle-features" onclick="window.setMainTypeFilter('features')" class="type-toggle-btn" data-term="nav_features">Combat Features</button>
                        <button id="type-toggle-scriptcasting" onclick="window.setMainTypeFilter('scriptcasting')" class="type-toggle-btn" data-term="nav_scripts">Scriptcasting</button>
                    </div>
                </div>

                <!-- VOCATION TABS (Scrollable & Draggable) -->
                <div class="flex overflow-x-auto custom-scrollbar gap-2 justify-start mb-2" id="vocation-tabs-container">
                    <!-- Populated by JS -->
                </div>
                
                <hr class="border-t border-[rgba(139,90,43,0.2)] mb-4 mt-2">

                <!-- Title & Action Buttons -->
                <div class="flex flex-col lg:flex-row justify-between items-center gap-4 mb-4">
                    <h2 id="view-title" class="text-2xl md:text-3xl font-heading text-gold font-bold uppercase tracking-widest drop-shadow text-center lg:text-left w-full lg:w-auto">All Records — Tricks</h2>
                    
                    <div class="flex flex-wrap items-center gap-3 w-full lg:w-auto justify-center lg:justify-end shrink-0">
                        <button id="btn-view-progression" onclick="window.openProgressionModal()" class="hidden fantasy-btn-alt px-4 py-2.5 rounded text-[10px] uppercase font-bold tracking-widest shadow-lg border-indigo-700 text-indigo-400 hover:text-white hover:border-indigo-400"><i class="fa-solid fa-list-ol mr-2"></i>Progression</button>
                        <button id="btn-import" onclick="window.openImportModal()" class="hidden fantasy-btn-alt px-4 py-2.5 rounded text-[10px] uppercase font-bold tracking-widest shadow-lg"><i class="fa-solid fa-download mr-2"></i>Codex Packs</button>
                        <button id="btn-publish-pack" onclick="window.openCreatePackModal()" class="hidden fantasy-btn-alt px-4 py-2.5 rounded text-[10px] uppercase font-bold tracking-widest shadow-lg border-indigo-700 text-indigo-400 hover:text-white hover:border-indigo-400"><i class="fa-solid fa-upload mr-2"></i>Publish Pack</button>
                        <button onclick="document.getElementById('definitions-modal').classList.remove('hidden')" class="fantasy-btn-alt px-4 py-2.5 rounded text-[10px] uppercase font-bold tracking-widest shadow-lg"><i class="fa-solid fa-book-open mr-2"></i>Definitions</button>
                        <button id="btn-wipe-codex" onclick="window.confirmWipeCodex()" class="hidden fantasy-btn-alt px-4 py-2.5 rounded text-[10px] uppercase font-bold tracking-widest shadow-lg !border-red-900 !text-red-500 hover:!bg-red-900 hover:!text-white transition-colors"><i class="fa-solid fa-skull mr-2"></i>Wipe Codex</button>
                        <button id="btn-create-script" onclick="window.openScriptModal()" class="hidden fantasy-btn px-6 py-2.5 rounded text-[10px] uppercase font-bold tracking-widest shadow-lg"><i class="fa-solid fa-plus mr-2"></i>Inscribe</button>
                    </div>
                </div>

                <!-- Level Filters Row -->
                <div class="flex flex-wrap items-center justify-center lg:justify-start gap-1 w-full bg-black/30 p-2.5 rounded-lg border border-[rgba(139,90,43,0.15)] shadow-inner" id="level-tabs-container">
                    <!-- Populated by JS based on Category/Vocation -->
                </div>
            </div>

            <!-- SCRIPTS GRID -->
            <div id="scripts-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
                <!-- Cards populate here -->
            </div>
        </div>
    </div>

    <div id="progression-modal" class="modal-overlay hidden z-[900]">
        <div class="modal-container max-w-5xl max-h-[90vh] overflow-y-auto custom-scrollbar relative p-8 border-4 border-double border-gold/40 shadow-2xl" style="background-color: #f1e5c5; background-image: radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.4) 100%), url('data:image/svg+xml,%3Csvg width=\'100\' height=\'100\' viewBox=\'0 0 100 100\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cfilter id=\'noise\'%3E%3CfeTurbulence type=\'fractalNoise\' baseFrequency=\'0.05\' numOctaves=\'3\' stitchTiles=\'stitch\'/%3E%3C/filter%3E%3Crect width=\'100\' height=\'100\' filter=\'url(%23noise)\' opacity=\'0.08\'/%3E%3C/svg%3E');">
            
            <button onclick="document.getElementById('progression-modal').classList.add('hidden')" class="absolute top-4 right-4 text-2xl text-gray-500 hover:text-blood transition-colors"><i class="fa-solid fa-times"></i></button>
            
            <div class="mb-6">
                <h2 class="font-heading text-3xl font-black text-ink uppercase tracking-widest flex items-center gap-2">Features <span class="text-blood italic font-serif capitalize">Progression</span></h2>
                <p id="progression-subtitle" class="font-serif italic text-sm text-gray-600 mt-1">Class Name</p>
            </div>

            <div class="overflow-x-auto w-full">
                <table class="w-full text-[13px] font-serif border-collapse" id="progression-table">
                    <thead>
                        <tr class="text-[10px] text-gray-500 font-heading uppercase tracking-widest border-b-2 border-gold/40">
                            <th class="py-3 text-center w-12 text-ink">Lvl</th>
                            <th class="py-3 text-center w-16 text-ink">Prof.</th>
                            <th class="py-3 text-left text-ink">Class Features</th>
                            <th class="py-3 text-center w-24 text-ink"><input type="text" id="prog-h1" placeholder="Cust 1" class="w-full bg-transparent text-center uppercase outline-none font-bold placeholder-gray-400" /></th>
                            <th class="py-3 text-center w-24 text-ink"><input type="text" id="prog-h2" placeholder="Cust 2" class="w-full bg-transparent text-center uppercase outline-none font-bold placeholder-gray-400" /></th>
                            <th class="py-3 text-center w-24 text-ink"><input type="text" id="prog-h3" placeholder="Cust 3" class="w-full bg-transparent text-center uppercase outline-none font-bold placeholder-gray-400" /></th>
                        </tr>
                    </thead>
                    <tbody id="progression-table-body">
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
            
            <div class="flex justify-end mt-6 border-t border-gold/40 pt-4 hidden" id="progression-admin-actions">
                <button onclick="window.saveProgressionTable()" class="fantasy-btn px-6 py-2 rounded text-xs shadow-lg">Save Progression</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE & LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, setDoc, onSnapshot, addDoc, deleteDoc, getDoc, getDocs, writeBatch, arrayUnion } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        // --- CORE UI FUNCTIONS ---
        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            if(t){ t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 4000); } 
        };

        window.routeTo = (page) => {
            const currentId = new URLSearchParams(window.location.search).get('id') || new URLSearchParams(window.location.search).get('campaignId');
            try {
                if (currentId && currentId !== "demo_campaign") {
                    const separator = page.includes('?') ? '&' : '?';
                    window.location.href = `${page}${separator}id=${currentId}`;
                } else {
                    window.location.href = page;
                }
            } catch(e) {
                window.showToast("Redirects disabled in preview window.");
            }
        };

        let confirmCallback = null;
        window.customConfirm = (message, callback) => {
            document.getElementById('confirm-modal-text').innerText = message;
            document.getElementById('confirm-modal').classList.remove('hidden');
            confirmCallback = callback;
        };
        window.closeConfirmModal = (result) => {
            document.getElementById('confirm-modal').classList.add('hidden');
            if (confirmCallback) confirmCallback(result);
            confirmCallback = null;
        };

        // --- WIPE CODEX LOGIC ---
        window.confirmWipeCodex = () => {
            if (activeRole !== 'dm') return;
            if (scripts.length === 0) return window.showToast("Codex is already empty.");
            
            document.getElementById('wipe-codex-modal').classList.remove('hidden');
        };

        window.executeWipeCodex = async () => {
            document.getElementById('wipe-codex-modal').classList.add('hidden');
            window.showToast("Wiping Codex...");
            
            try {
                const batch = writeBatch(db);
                const q = collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION);
                const snap = await getDocs(q);
                
                snap.docs.forEach(d => {
                    batch.delete(d.ref);
                });
                
                await batch.commit();
                window.showToast("Codex wiped clean.");
            } catch (err) {
                console.error(err);
                window.showToast("Failed to wipe Codex.");
            }
        };

        // --- HORIZONTAL DRAG & SCROLL FIX ---
        const enableDraggableHScroll = (id) => {
            const slider = document.getElementById(id);
            if (!slider) return;
            let isDown = false;
            let startX;
            let scrollLeft;

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.classList.add('cursor-grabbing');
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.classList.remove('cursor-grabbing');
            });
            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.classList.remove('cursor-grabbing');
            });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2; // Scroll-fast
                slider.scrollLeft = scrollLeft - walk;
            });
            // Wheel scroll
            slider.addEventListener('wheel', (e) => {
                if (e.deltaY !== 0) {
                    e.preventDefault();
                    slider.scrollLeft += e.deltaY;
                }
            }, { passive: false });
        };
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => { enableDraggableHScroll('vocation-tabs-container'); enableDraggableHScroll('main-nav'); });
        } else {
            enableDraggableHScroll('vocation-tabs-container'); enableDraggableHScroll('main-nav');
        }

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e"
        };

        const ADMIN_OWNER_EMAIL = "admin@chronicles.com";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // --- CAMPAIGN SCOPING ---
        const urlParams = new URLSearchParams(window.location.search);
        let appId = urlParams.get('id') || urlParams.get('campaignId');
        const isPreviewEnv = window.location.href.startsWith('blob:') || window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        
        if (!appId) {
            if (isPreviewEnv) { appId = "demo_campaign"; } 
            else { try { window.location.href = "campaigns.html"; } catch(e) {} }
        }

        const DB_COLLECTION = `scriptCodex_${appId}`;

        // --- STATE ---
        let scripts = [];
        let characters = []; 
        let vocationsData = []; 
        let currentUser = null;
        let activeRole = 'player';
        let adminModeActive = false;
        
        let mainTypeFilter = 'All'; // 'All', 'features', 'scriptcasting'
        let currentLevelFilter = '0';
        let currentVocationFilter = 'All'; 
        
        let activeScriptId = null;
        let targetTransferScript = null;
        let campaignSettings = { terms: {} };
        let customDefinitions = null;
        let materialComponents = []; 
        
        let progressionTablesData = {};

        let allFetchedPacks = [];
        let currentViewingPack = null;
        let packMessagesUnsubscribe = null;

        const VOC_KEYS = [
            { id: 'class_vanguard', default: 'Vanguard', type: 'features' },
            { id: 'class_warrior', default: 'Warrior', type: 'features' },
            { id: 'class_peacemaker', default: 'Peacemaker', type: 'features' },
            { id: 'class_scavenger', default: 'Scavenger', type: 'features' },
            { id: 'class_heartbound', default: 'Heartbound', type: 'both' },
            { id: 'class_nomad', default: 'Nomad', type: 'both' },
            { id: 'class_warden', default: 'Wilderness Warden', type: 'scripts' },
            { id: 'class_chronicler', default: 'Chronicler', type: 'scripts' },
            { id: 'class_orator', default: 'Orator', type: 'scripts' },
            { id: 'class_scriptweaver', default: 'Scriptweaver', type: 'scripts' },
            { id: 'class_wartouched', default: 'War-Touched', type: 'scripts' },
            { id: 'class_archivist', default: 'Archivist', type: 'scripts' },
            { id: 'class_fabricator', default: 'Fabricator', type: 'scripts' }
        ];

        // --- RENDER AND FILTER LOGIC ---
        window.selectPackIcon = (btn, hiddenInputId) => {
            const container = btn.parentElement;
            container.querySelectorAll('.icon-selector-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById(hiddenInputId).value = btn.dataset.icon;
        };

        window.setMainTypeFilter = (type) => {
            mainTypeFilter = type;
            document.querySelectorAll('.type-toggle-btn').forEach(btn => btn.classList.remove('active'));
            
            // Re-added specific check for the scriptcasting button ID bug
            const btnId = type === 'scriptcasting' ? 'type-toggle-scriptcasting' : `type-toggle-${type.toLowerCase()}`;
            const targetBtn = document.getElementById(btnId);
            if (targetBtn) targetBtn.classList.add('active');
            
            if (type === 'features') {
                if (currentLevelFilter === '0') currentLevelFilter = '1';
            }
            
            // Check if current vocation is allowed in this new filter
            if (currentVocationFilter !== 'All') {
                const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                if (voc) {
                    if (type === 'features' && voc.type === 'scripts') currentVocationFilter = 'All';
                    if (type === 'scriptcasting' && voc.type === 'features') currentVocationFilter = 'All';
                }
            }
            
            window.renderVocationTabs();
            window.renderLevelTabs();
            window.setLevelFilter(currentLevelFilter);
        };

        window.renderLevelTabs = () => {
            const container = document.getElementById('level-tabs-container');
            if (!container) return;

            let isFeatureMode = mainTypeFilter === 'features';
            if (currentVocationFilter !== 'All') {
                const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                if (voc && voc.type === 'features') isFeatureMode = true;
            }

            let html = '';
            
            if (isFeatureMode) {
                const FEATURE_GROUPS = ['1-4', '5-10', '11-16', '17-20'];
                if (!FEATURE_GROUPS.includes(currentLevelFilter)) currentLevelFilter = '1-4';

                FEATURE_GROUPS.forEach(grp => {
                    const isActive = currentLevelFilter === grp ? 'active' : '';
                    html += `<button onclick="window.setLevelFilter('${grp}')" class="level-tab-wide ${isActive}" id="tab-lvl-${grp}">Lv. ${grp}</button>`;
                });
            } else {
                let minLvl = 0;
                let maxLvl = 9;
                
                if (currentVocationFilter === 'class_heartbound' || currentVocationFilter === 'class_nomad') {
                    minLvl = 1;
                    maxLvl = 5;
                } else if (currentVocationFilter === 'class_fabricator') {
                    minLvl = 0;
                    maxLvl = 5;
                }

                let currLvlInt = parseInt(currentLevelFilter) || minLvl;
                if (currLvlInt < minLvl) currentLevelFilter = minLvl.toString();
                if (currLvlInt > maxLvl) currentLevelFilter = maxLvl.toString();

                for (let i = minLvl; i <= maxLvl; i++) {
                    const isActive = currentLevelFilter === i.toString() ? 'active' : '';
                    const label = i === 0 ? 'T' : i; 
                    html += `<button onclick="window.setLevelFilter('${i}')" class="level-tab ${isActive}" id="tab-lvl-${i}">${label}</button>`;
                }
            }
            container.innerHTML = html;
        };

        window.setLevelFilter = (lvl) => {
            currentLevelFilter = lvl;
            document.querySelectorAll('.level-tab').forEach(t => t.classList.remove('active'));
            const activeTab = document.getElementById(`tab-lvl-${lvl}`);
            if (activeTab) activeTab.classList.add('active');
            
            const vt = document.getElementById('view-title');
            if (vt) {
                let prefixTxt = campaignSettings?.terms?.nav_all_records || 'All Records';
                if (mainTypeFilter === 'features') prefixTxt = campaignSettings?.terms?.nav_features || 'Combat Features';
                if (mainTypeFilter === 'scriptcasting') prefixTxt = campaignSettings?.terms?.nav_scripts || 'Scriptcasting';

                if (currentVocationFilter !== 'All') {
                    const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                    if (voc) prefixTxt = campaignSettings?.terms?.[voc.id] || voc.default;
                }
                
                let isFeatureMode = mainTypeFilter === 'features' || (currentVocationFilter !== 'All' && VOC_KEYS.find(v => v.id === currentVocationFilter)?.type === 'features');

                let lvlTxt = "";
                if (isFeatureMode) {
                    lvlTxt = `Levels ${lvl}`;
                } else {
                    lvlTxt = lvl === '0' ? 'Tricks' : `Lv. ${lvl}`;
                }

                vt.textContent = `${prefixTxt} — ${lvlTxt}`;
            }
            window.renderScripts();
        };

        window.setVocationFilter = (vocId) => {
            currentVocationFilter = vocId;
            
            if (vocId !== 'All') {
                const voc = VOC_KEYS.find(v => v.id === vocId);
                if (voc) {
                    if (voc.type === 'features' && mainTypeFilter !== 'features') window.setMainTypeFilter('features');
                    if (voc.type === 'scripts' && mainTypeFilter !== 'scriptcasting') window.setMainTypeFilter('scriptcasting');
                }
            }

            window.renderVocationTabs();
            window.renderLevelTabs();
            window.setLevelFilter(currentLevelFilter); 

            const progBtn = document.getElementById('btn-view-progression');
            if (progBtn) {
                if (vocId !== 'All') {
                    progBtn.classList.remove('hidden');
                } else {
                    progBtn.classList.add('hidden');
                }
            }
        };

        window.renderVocationTabs = () => {
            const container = document.getElementById('vocation-tabs-container');
            if (!container) return;
            
            let html = `<button onclick="window.setVocationFilter('All')" class="vocation-tab ${currentVocationFilter === 'All' ? 'active' : ''}" id="tab-voc-All">ALL</button>`;
            
            VOC_KEYS.forEach(v => {
                if (mainTypeFilter === 'features' && v.type === 'scripts') return;
                if (mainTypeFilter === 'scriptcasting' && v.type === 'features') return;

                const displayName = campaignSettings?.terms?.[v.id] || v.default;
                html += `<button onclick="window.setVocationFilter('${v.id}')" class="vocation-tab ${currentVocationFilter === v.id ? 'active' : ''}" id="tab-voc-${v.id}">${displayName.toUpperCase()}</button>`;
            });
            container.innerHTML = html;
        };

        window.parseAeonfallContent = (text) => {
            if (!text) return '';
            let html = text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
            html = html.replace(/\*(.*?)\*/g, '<i>$1</i>');
            html = html.replace(/\n/g, '<br>');
            return html;
        };

        window.checkAndRouteMaterial = (itemName) => {
            const cleanName = itemName.trim().toLowerCase();
            const exists = materialComponents.some(m => (m.name || '').toLowerCase() === cleanName);
            if (exists) {
                const cid = new URLSearchParams(window.location.search).get('id');
                window.location.href = `gear_artifacts.html?targetItem=${encodeURIComponent(itemName.trim())}` + (cid ? `&id=${cid}` : '');
            } else {
                window.showToast(`This Material (${itemName.trim()}) is not found in the Public Index, please let your DM know.`);
            }
        };

        window.viewScript = (id) => {
            const s = scripts.find(x => x.id === id);
            if (!s) return;
            
            const isFeature = s.entryType === 'features';

            let lvlTxt = "";
            if (isFeature) {
                lvlTxt = `Level ${s.level || '1'}`;
            } else {
                lvlTxt = s.level === '0' ? 'Trick' : `Level ${s.level}`;
            }

            let typeTxt = s.sType ? `[${s.sType}]` : '';
            let metaTxt = `${lvlTxt} — ${s.school || (isFeature ? 'Combat Maneuver' : 'Universal')} ${typeTxt}`;

            let compHtml = (s.comp || '--').replace(/\((.*?)\)/g, (match, p1) => {
                const safeStr = p1.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                return `(<a href="#" onclick="event.stopPropagation(); window.checkAndRouteMaterial('${safeStr}'); return false;" class="text-blood hover:text-red-700 underline font-bold transition-colors cursor-pointer" title="Search in Artifacts">${p1}</a>)`;
            });

            document.getElementById('view-modal-title').textContent = s.name || 'Unnamed Entry';
            document.getElementById('view-modal-meta').textContent = metaTxt;
            
            document.getElementById('view-modal-label-time').textContent = isFeature ? "Action Cost" : "Activation";
            document.getElementById('view-modal-time').textContent = s.activation || '--';
            
            document.getElementById('view-modal-range').textContent = s.range || '--';
            document.getElementById('view-modal-duration').textContent = s.duration || '--';
            
            const compContainer = document.getElementById('view-modal-comp-container');
            const grid = document.getElementById('view-modal-grid');
            if (isFeature) {
                compContainer.classList.add('hidden');
                grid.classList.remove('md:grid-cols-4');
                grid.classList.add('md:grid-cols-3');
            } else {
                compContainer.classList.remove('hidden');
                grid.classList.remove('md:grid-cols-3');
                grid.classList.add('md:grid-cols-4');
                document.getElementById('view-modal-comp').innerHTML = compHtml;
            }

            document.getElementById('view-modal-desc').innerHTML = window.parseAeonfallContent(s.desc);
            
            const higherContainer = document.getElementById('view-modal-higher-container');
            if (s.scaling && s.scaling.trim() !== '') {
                higherContainer.classList.remove('hidden');
                document.getElementById('view-modal-higher').innerHTML = window.parseAeonfallContent(s.scaling);
            } else {
                higherContainer.classList.add('hidden');
            }
            document.getElementById('view-modal-lists').textContent = s.lists || 'Universal';
            document.getElementById('script-view-modal').classList.remove('hidden');
        };

        window.closeViewModal = () => {
            document.getElementById('script-view-modal').classList.add('hidden');
            if (window.history.replaceState) {
                const url = new URL(window.location);
                url.searchParams.delete('targetScript');
                window.history.replaceState(null, '', url);
            }
        };

        // --- DEFINITIONS HANDLING ---
        const DEFAULT_DEFINITIONS = `**Scriptcasting**
The Eternal Heart saturates Aeonfall with unseen energies. Across the world, these energies can be shaped into precise patterns known as **Scripts**.

### What Is a Script?
A Script is a structured expression of Heart-energy.

When a Scriptcaster uses a Script, they shape the invisible currents of the Eternal Heart into a specific pattern that produces a desired effect.

### Script Tier
Every Script belongs to a **Tier** from 0 to 9. A Script's Tier represents the complexity and power required to shape Heart-energy into that effect.
- **Tier 0:** Tricks
- **Tier 1–3:** Basic Scripts
- **Tier 4–6:** Advanced Scripts
- **Tier 7–9:** Master Scripts`;

        window.parseMarkdown = (text) => {
            if (!text) return '';
            let html = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            html = html.replace(/^### (.*$)/gim, '<h3 class="font-heading text-xl font-bold text-blood uppercase tracking-wide border-b border-gold/50 mt-6 mb-2 pb-1">$1</h3>');
            html = html.replace(/^## (.*$)/gim, '<h2 class="font-heading text-2xl font-bold text-blood uppercase tracking-wide border-b-2 border-gold mt-8 mb-4 pb-2">$1</h2>');
            html = html.replace(/^# (.*$)/gim, '<h1 class="font-heading text-3xl font-black text-blood uppercase tracking-widest mt-8 mb-4">$1</h1>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<b class="font-bold text-ink">$1</b>');
            html = html.replace(/\*(.*?)\*/g, '<i class="italic text-ink/90">$1</i>');
            html = html.replace(/^\- (.*$)/gim, '<li class="ml-4 list-disc">$1</li>');
            let paragraphs = html.split(/\n\n+/);
            html = paragraphs.map(p => {
                if(p.trim().startsWith('<h') || p.trim().startsWith('<li')) return p;
                return `<p class="mb-3">${p.replace(/\n/g, '<br>')}</p>`;
            }).join('');
            html = html.replace(/(<li[^>]*>[\s\S]*?<\/li>)/g, '<ul class="mb-4 space-y-1 ml-2">$1</ul>');
            html = html.replace(/<\/ul>\s*<ul class="mb-4 space-y-1 ml-2">/g, ''); 
            return html;
        };

        window.renderDefinitions = () => {
            const container = document.getElementById('definitions-view');
            if (container) container.innerHTML = window.parseMarkdown(customDefinitions || DEFAULT_DEFINITIONS);
        };

        window.toggleDefinitionsEditMode = (editMode) => {
            if (editMode && activeRole !== 'dm') return window.showToast("Only the Game Master can edit the Codex Definitions.");
            const viewDiv = document.getElementById('definitions-view');
            const editDiv = document.getElementById('definitions-edit');
            if (editMode) {
                viewDiv.classList.add('hidden');
                editDiv.classList.remove('hidden');
                document.getElementById('definitions-textarea').value = customDefinitions || DEFAULT_DEFINITIONS;
            } else {
                viewDiv.classList.remove('hidden');
                editDiv.classList.add('hidden');
            }
        };

        window.saveDefinitions = async () => {
            if (activeRole !== 'dm') return;
            const newText = document.getElementById('definitions-textarea').value.trim();
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'campaignConfig', 'codexDefinitions'), {
                    text: newText,
                    updatedAt: Date.now()
                }, { merge: true });
                window.showToast("Definitions saved.");
                window.toggleDefinitionsEditMode(false);
            } catch (err) {
                console.error(err);
                window.showToast("Error saving definitions.");
            }
        };

        // --- CAMPAIGN TERMINOLOGY (DM ONLY) ---
        window.openCampaignSettings = () => {
            if (activeRole !== 'dm') return;
            const terms = campaignSettings?.terms || {};
            const safeSetVal = (id, val, defaultVal) => {
                const el = document.getElementById(id);
                if (el) el.value = val || defaultVal || '';
            };
            
            safeSetVal('term-nav_all_records', terms.nav_all_records, 'All Records');
            safeSetVal('term-nav_features', terms.nav_features, 'Combat Features');
            safeSetVal('term-nav_scripts', terms.nav_scripts, 'Scriptcasting');
            
            safeSetVal('term-class_vanguard', terms.class_vanguard, 'Vanguard');
            safeSetVal('term-class_warrior', terms.class_warrior, 'Warrior');
            safeSetVal('term-class_peacemaker', terms.class_peacemaker, 'Peacemaker');
            safeSetVal('term-class_scavenger', terms.class_scavenger, 'Scavenger');
            safeSetVal('term-class_heartbound', terms.class_heartbound, 'Heartbound');
            safeSetVal('term-class_nomad', terms.class_nomad, 'Nomad');
            safeSetVal('term-class_warden', terms.class_warden, 'Wilderness Warden');
            safeSetVal('term-class_chronicler', terms.class_chronicler, 'Chronicler');
            safeSetVal('term-class_orator', terms.class_orator, 'Orator');
            safeSetVal('term-class_scriptweaver', terms.class_scriptweaver, 'Scriptweaver');
            safeSetVal('term-class_wartouched', terms.class_wartouched, 'War-Touched');
            safeSetVal('term-class_archivist', terms.class_archivist, 'Archivist');
            safeSetVal('term-class_fabricator', terms.class_fabricator, 'Fabricator');

            document.getElementById('campaign-settings-modal').classList.remove('hidden');
        };

        window.closeCampaignSettings = () => {
            document.getElementById('campaign-settings-modal').classList.add('hidden');
        };

        window.saveCampaignSettings = async () => {
            if (activeRole !== 'dm') return;
            const getVal = (id) => document.getElementById(id).value.trim();
            
            const newTerms = {
                nav_all_records: getVal('term-nav_all_records') || 'All Records',
                nav_features: getVal('term-nav_features') || 'Combat Features',
                nav_scripts: getVal('term-nav_scripts') || 'Scriptcasting',
                
                class_vanguard: getVal('term-class_vanguard') || 'Vanguard',
                class_warrior: getVal('term-class_warrior') || 'Warrior',
                class_peacemaker: getVal('term-class_peacemaker') || 'Peacemaker',
                class_scavenger: getVal('term-class_scavenger') || 'Scavenger',
                class_heartbound: getVal('term-class_heartbound') || 'Heartbound',
                class_nomad: getVal('term-class_nomad') || 'Nomad',
                class_warden: getVal('term-class_warden') || 'Wilderness Warden',
                class_chronicler: getVal('term-class_chronicler') || 'Chronicler',
                class_orator: getVal('term-class_orator') || 'Orator',
                class_scriptweaver: getVal('term-class_scriptweaver') || 'Scriptweaver',
                class_wartouched: getVal('term-class_wartouched') || 'War-Touched',
                class_archivist: getVal('term-class_archivist') || 'Archivist',
                class_fabricator: getVal('term-class_fabricator') || 'Fabricator'
            };

            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'campaignConfig', 'settings'), {
                    terms: newTerms,
                    updatedAt: Date.now()
                }, { merge: true });
                window.showToast("Campaign terminology updated.");
                window.closeCampaignSettings();
            } catch (err) {
                console.error(err);
                window.showToast("Error saving terminology.");
            }
        };

        window.renderScripts = () => {
            const isDM = activeRole === 'dm';
            const grid = document.getElementById('scripts-grid');
            if (!grid) return;

            let visibleScripts = scripts;
            
            if (mainTypeFilter === 'features') {
                visibleScripts = visibleScripts.filter(s => s.entryType === 'features');
            } else if (mainTypeFilter === 'scriptcasting') {
                visibleScripts = visibleScripts.filter(s => s.entryType !== 'features');
            }

            let isFeatureMode = mainTypeFilter === 'features' || (currentVocationFilter !== 'All' && VOC_KEYS.find(v => v.id === currentVocationFilter)?.type === 'features');

            if (isFeatureMode) {
                const [minLvl, maxLvl] = currentLevelFilter.split('-').map(Number);
                visibleScripts = visibleScripts.filter(s => {
                    if (s.entryType !== 'features') return false;
                    const l = parseInt(s.level) || 1;
                    return l >= minLvl && l <= maxLvl;
                });
            } else {
                visibleScripts = visibleScripts.filter(s => (s.level || '0') === currentLevelFilter && s.entryType !== 'features');
            }

        // --- DM ACTIONS AND SAVE LOGIC ---
        window.setScriptFormType = (type) => {

            document.getElementById('btn-form-feature').className = isFeature ? "px-4 py-1.5 rounded-r text-[10px] font-bold uppercase tracking-widest font-heading transition-colors bg-blood text-parchment border border-gold" : "px-4 py-1.5 rounded-r text-[10px] font-bold uppercase tracking-widest font-heading transition-colors bg-[rgba(255,255,255,0.4)] border border-[rgba(139,90,43,0.4)] text-ink hover:bg-[rgba(197,160,89,0.2)]";

        window.openScriptModal = (id = null) => {

            const typeToggle = document.getElementById('script-modal-type-toggle');

                const s = scripts.find(x => x.id === id);

                document.getElementById('script-level').value = s.level || '0';
                document.getElementById('script-school').value = s.school || '';
                document.getElementById('script-type').value = s.sType || '';
                document.getElementById('script-activation').value = s.activation || '';
                document.getElementById('script-range').value = s.range || '';
                document.getElementById('script-comp').value = s.comp || '';
                document.getElementById('script-duration').value = s.duration || '';
                document.getElementById('script-desc').value = s.desc || '';
                document.getElementById('script-scaling').value = s.scaling || '';
                document.getElementById('script-lists').value = s.lists || '';

                let defaultLvl = currentLevelFilter;

                document.getElementById('script-activation').value = '';
                document.getElementById('script-range').value = '';
                document.getElementById('script-comp').value = '';
                document.getElementById('script-duration').value = '';
                document.getElementById('script-desc').value = '';
                document.getElementById('script-scaling').value = '';
                
                let listDefault = "";
                if (currentVocationFilter !== 'All') {
                    const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
                    if (voc) listDefault = campaignSettings?.terms?.[voc.id] || voc.default;
                }
                document.getElementById('script-lists').value = listDefault;
                document.getElementById('script-delete-btn').classList.add('hidden');
            }
            
            document.getElementById('script-modal').classList.remove('hidden');

        window.closeScriptModal = () => document.getElementById('script-modal').classList.add('hidden');

        window.saveScript = async () => {
            if (activeRole !== 'dm') return;
            const entryType = document.getElementById('script-form-type').value;

            const payload = {
                entryType: entryType,
                name: document.getElementById('script-name').value.trim() || 'Unnamed Entry',
                level: document.getElementById('script-level').value.toString(),
                activation: document.getElementById('script-activation').value.trim(),
                range: document.getElementById('script-range').value.trim(),
                duration: document.getElementById('script-duration').value.trim(),
                desc: document.getElementById('script-desc').value.trim(),
                lists: document.getElementById('script-lists').value.trim(),
                updatedAt: Date.now()
            };

            if (entryType === 'scriptcasting') {
                payload.school = document.getElementById('script-school').value.trim();
                payload.sType = document.getElementById('script-type').value.trim();
                payload.comp = document.getElementById('script-comp').value.trim();
                payload.scaling = document.getElementById('script-scaling').value.trim();
            }

            try {
                if (activeScriptId) {
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, activeScriptId), payload);
                    window.showToast("Record updated.");
                } else {
                    payload.createdAt = Date.now();
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), payload);
                    window.showToast("New Record Inscribed.");
                }
                window.closeScriptModal();
            } catch (err) {
                console.error(err);
                window.showToast("Error saving record.");
            }
        };

        window.requestDeleteScript = () => {
            window.customConfirm("Permanently erase this record from the codex?", async (confirmed) => {
                if(confirmed) {
                    if (activeRole !== 'dm' || !activeScriptId) return;
                    try {
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION, activeScriptId));
                        window.closeScriptModal();
                        window.showToast("Record erased.");
                    } catch (e) {
                        window.showToast("Error deleting record.");
                    }
                }
            });
        };

        // --- TRANSFER SYSTEM ---
        window.openTransferModal = (scriptId) => {
            targetTransferScript = scripts.find(s => s.id === scriptId);
            if (!targetTransferScript) return;
            
            const charSelect = document.getElementById('transfer-char-select');
            charSelect.innerHTML = '<option value="">Select Target...</option>';
            const isDM = activeRole === 'dm';
            const validTargets = characters.filter(c => c.type === 'PC' && !c.isDeleted && (isDM || c.owner === currentUser.username));
            
            if (validTargets.length === 0) charSelect.innerHTML = '<option value="">No valid characters found</option>';
            else validTargets.forEach(c => { charSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`; });
            
            const vocSelect = document.getElementById('transfer-voc-select');
            const vocContainer = document.querySelector('.transfer-voc-container');
            const orDivider = document.querySelector('.transfer-or-divider');
            
            if (isDM) {
                vocContainer.classList.remove('hidden');
                orDivider.classList.remove('hidden');
                vocSelect.innerHTML = '<option value="">Select Vocation...</option>';
                if (vocationsData.length === 0) vocSelect.innerHTML += '<option value="">No vocations found</option>';
                else vocationsData.forEach(v => { vocSelect.innerHTML += `<option value="${v.id}">${v.name}</option>`; });
            } else {
                vocContainer.classList.add('hidden');
                orDivider.classList.add('hidden');
            }
            document.getElementById('transfer-modal').classList.remove('hidden');
        };

        window.executeTransfer = async () => {
            const charId = document.getElementById('transfer-char-select').value;
            const vocId = document.getElementById('transfer-voc-select')?.value;
            const isDM = activeRole === 'dm';
            
            if (!charId && !vocId) return window.showToast("Select a target first.");
            if (!targetTransferScript) return window.showToast("No record selected.");

            const isFeature = targetTransferScript.entryType === 'features';

            let fullDesc = `**${isFeature ? 'Action Cost' : 'Cast Time'}:** ${targetTransferScript.activation || '--'}\n**Range:** ${targetTransferScript.range || '--'}\n**Duration:** ${targetTransferScript.duration || '--'}`;
            if (!isFeature) fullDesc += `\n**Components:** ${targetTransferScript.comp || '--'}`;
            fullDesc += `\n\n${targetTransferScript.desc}`;

            try {
                if (charId) {
                    const char = characters.find(c => c.id === charId);
                    if (!char) return window.showToast("Character not found.");
                    
                    let levelLabel = "";
                    if (isFeature) {
                        levelLabel = `Level ${targetTransferScript.level || '1'}`;
                    } else {
                        levelLabel = targetTransferScript.level === '0' ? 'Tricks (0)' : `Level ${targetTransferScript.level}`;
                    }

                    const newMove = {
                        name: targetTransferScript.name, roll: "", desc: fullDesc,
                        lvl: levelLabel,
                        type: isFeature ? "features" : "scriptcasting", 
                        school: targetTransferScript.school || '', 
                        sType: targetTransferScript.sType || '',
                        activation: targetTransferScript.activation || '', range: targetTransferScript.range || '', comp: targetTransferScript.comp || '',
                        duration: targetTransferScript.duration || '', scaling: targetTransferScript.scaling || ''
                    };
                    const updatedMoves = [...(char.moves || []), newMove];
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'characters', charId), { moves: updatedMoves });
                    window.showToast(`Record injected into ${char.name}'s ledger!`);
                } 
                else if (vocId && isDM) {
                    const voc = vocationsData.find(v => v.id === vocId);
                    if (!voc) return window.showToast("Vocation not found.");
                    const VOCATIONS_COLLECTION = `handbookVocations_${appId}`;
                    
                    let targetLevelStr = "";
                    if (isFeature) {
                        targetLevelStr = `Level ${targetTransferScript.level || '1'}`;
                    } else {
                        targetLevelStr = targetTransferScript.level === '0' ? 'Tricks' : `Tier ${targetTransferScript.level}`;
                    }

                    let tiers = JSON.parse(voc.scriptTiers || '[]');
                    let tierIndex = tiers.findIndex(t => (t.title || '').toLowerCase().includes(targetLevelStr.toLowerCase()) || (t.title || '').toLowerCase().includes(`level ${targetTransferScript.level}`));
                    const listEntry = `\n- <a href="#" onclick="event.preventDefault(); const cid = new URLSearchParams(window.location.search).get('id'); window.location.href = 'script_codex.html?targetScript=${targetTransferScript.id}' + (cid ? '&id=' + cid : '');" class="text-blood hover:text-red-700 underline font-bold transition-colors cursor-pointer" title="View Details" contenteditable="false">**${targetTransferScript.name.toUpperCase()}**</a> [${targetTransferScript.school || 'Universal'}]: ${targetTransferScript.activation}, ${targetTransferScript.range}, ${targetTransferScript.duration}`;
                    if (tierIndex >= 0) tiers[tierIndex].list = (tiers[tierIndex].list || '') + listEntry;
                    else tiers.push({ title: `${targetLevelStr} ${isFeature ? 'Features' : 'Scripts'}`, list: listEntry.trim() });
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', VOCATIONS_COLLECTION, vocId), { scriptTiers: JSON.stringify(tiers) });
                    window.showToast(`Record injected into ${voc.name}'s Terminal!`);
                }
                document.getElementById('transfer-modal').classList.add('hidden');
                targetTransferScript = null;
                document.getElementById('transfer-char-select').value = '';
                if(document.getElementById('transfer-voc-select')) document.getElementById('transfer-voc-select').value = '';
            } catch (err) {
                console.error(err);
                window.showToast("Transfer failed.");
            }
        };

        // --- COMPENDIUM IMPORT & UPDATES ---

            document.getElementById('import-modal').classList.remove('hidden');
            document.getElementById('import-loading').classList.remove('hidden');

                allFetchedPacks = [

                        ${pack.isPrivate ? '<div class="absolute top-2 right-2 text-gray-500" title="Private Pack"><i class="fa-solid fa-lock text-xs"></i></div>' : '<div class="absolute top-2 right-2 text-indigo-400" title="Public Pack"><i class="fa-solid fa-globe text-xs"></i></div>'}
                        <i class="${pack.icon || 'fa-solid fa-book-journal-whills'} text-3xl mb-3 ${pack.isDeleted ? 'text-gray-500' : 'text-gold'}"></i>

            document.getElementById('import-modal').classList.add('hidden');

            if (currentViewingPack.isDeleted) {
                document.getElementById('pd-title').innerHTML = `${currentViewingPack.name} <span class="text-[10px] bg-red-900 text-white px-2 py-1 rounded ml-2 align-middle shadow-md tracking-widest">ARCHIVED</span>`;

            document.getElementById('pd-desc').innerText = currentViewingPack.description || 'No description provided.';
            document.getElementById('pd-notes').innerText = currentViewingPack.updateNotes || 'Initial publication.';

                if (archiveBtn) archiveBtn.classList.toggle('hidden', isArchived);

                        return `

            input.value = '';

                ? ['artifacts', 'global_codex', 'users', currentViewingPack.authorId, 'scriptPacks', currentViewingPack.id, 'messages']
                : ['artifacts', 'global_codex', 'public', 'data', 'scriptPacks', currentViewingPack.id, 'messages'];
                
            try {

                });

                console.error("Failed to post message", err);
                window.showToast("Failed to send message.");
            }
