                try {
                    const dataset = currentViewingPack.scripts || [];
                    if (dataset.length === 0) return window.showToast("This pack is empty.");

                    const batch = writeBatch(db);
                    dataset.forEach(item => {
                        const docRef = doc(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION));
                        batch.set(docRef, { ...item, createdAt: Date.now(), updatedAt: Date.now() });
                    });

                    // Increment Download Counter
                    const pathArgs = currentViewingPack.isPrivate 
                        ? ['artifacts', 'global_codex', 'users', currentViewingPack.authorId, 'scriptPacks', currentViewingPack.id]
                        : ['artifacts', 'global_codex', 'public', 'data', 'scriptPacks', currentViewingPack.id];
                    
                    const currentDownloads = currentViewingPack.downloads || 0;
                    batch.update(doc(db, ...pathArgs), { downloads: currentDownloads + 1 });

                    await batch.commit();
                    window.showToast("Pack injected successfully!");
                } catch (e) {
                    console.error(e);
                    window.showToast("Error during import.");
                }
            });
        };
        
        window.openUpdatePackModal = () => {
            if (!currentViewingPack) return;
            
            // Pre-fill fields with current pack data
            document.getElementById('pack-update-name').value = currentViewingPack.name || '';
            document.getElementById('pack-update-desc').value = currentViewingPack.description || '';
            document.getElementById('pack-update-notes').value = '';
            
            const currentIcon = currentViewingPack.icon || 'fa-solid fa-book-journal-whills';
            document.getElementById('pack-update-selected-icon').value = currentIcon;
            
            // Update icon selection buttons
            document.querySelectorAll('#pack-update-icon-selectors .icon-selector-btn').forEach(b => {
                if(b.dataset.icon === currentIcon) {
                    b.classList.add('active');
                } else {
                    b.classList.remove('active');
                }
            });
            
            document.getElementById('pack-update-modal').classList.remove('hidden');
        };
        
        window.executePackUpdate = async () => {
            if (!currentViewingPack || activeRole !== 'dm') return;
            
            const name = document.getElementById('pack-update-name').value.trim() || currentViewingPack.name;
            const desc = document.getElementById('pack-update-desc').value.trim();
            const notes = document.getElementById('pack-update-notes').value.trim() || 'Minor updates and script adjustments.';
            const icon = document.getElementById('pack-update-selected-icon').value || currentViewingPack.icon;
            
            const newVersion = (currentViewingPack.version || 1) + 1;
            
            const pathArgs = currentViewingPack.isPrivate 
                ? ['artifacts', 'global_codex', 'users', currentUser.uid, 'scriptPacks', currentViewingPack.id]
                : ['artifacts', 'global_codex', 'public', 'data', 'scriptPacks', currentViewingPack.id];
                
            window.showToast("Pushing update...");
            document.getElementById('pack-update-modal').classList.add('hidden');
            
            try {
                await updateDoc(doc(db, ...pathArgs), {
                    name: name,
                    description: desc,
                    icon: icon,
                    scripts: scripts.map(s => { const c = {...s}; delete c.id; return c; }),
                    version: newVersion,
                    updateNotes: notes,
                    updatedAt: Date.now()
                });
                window.showToast(`Pack updated to v${newVersion}!`);
                window.closePackDetails();
                window.openImportModal(); // Refresh the grid
            } catch (e) {
                console.error(e);
                window.showToast("Failed to update pack.");
            }
        };

        window.deleteCurrentPack = (permanent = false) => {
            if (!currentViewingPack || (currentViewingPack.authorId !== currentUser.uid && !adminModeActive)) return;
            
            if (permanent) {
                window.customConfirm("Are you sure you want to permanently delete this pack? This cannot be undone.", async (confirmed) => {
                    if (!confirmed) return;
                    const pathArgs = currentViewingPack.isPrivate 
                        ? ['artifacts', 'global_codex', 'users', currentViewingPack.authorId, 'scriptPacks', currentViewingPack.id]
                        : ['artifacts', 'global_codex', 'public', 'data', 'scriptPacks', currentViewingPack.id];
                    try {
                        await deleteDoc(doc(db, ...pathArgs));
                        window.showToast("Pack permanently deleted.");
                        window.closePackDetails();
                        if (window.openImportModal) window.openImportModal();
                        if (window.openPacksModal) window.openPacksModal();
                    } catch (e) {
                        console.error(e);
                        window.showToast("Failed to delete pack.");
                    }
                });
                return;
            }
            
            window.customConfirm("Archive this pack? It will no longer receive updates, but existing campaigns will keep their records.", async (confirmed) => {
                if (!confirmed) return;
                
                const pathArgs = currentViewingPack.isPrivate 
                    ? ['artifacts', 'global_codex', 'users', currentUser.uid, 'scriptPacks', currentViewingPack.id]
                    : ['artifacts', 'global_codex', 'public', 'data', 'scriptPacks', currentViewingPack.id];
                    
                try {
                    await updateDoc(doc(db, ...pathArgs), {
                        isDeleted: true,
                        updateNotes: 'Pack archived by author. No longer receiving updates.',
                        updatedAt: Date.now()
                    });
                    window.showToast("Pack archived.");
                    window.closePackDetails();
                    if (window.openImportModal) window.openImportModal();
                    if (window.openPacksModal) window.openPacksModal();
                } catch (e) {
                    console.error(e);
                    window.showToast("Failed to archive pack.");
                }
            });
        };

        window.unarchiveCurrentPack = () => {
            if (!currentViewingPack || (currentViewingPack.authorId !== currentUser.uid && !adminModeActive)) return;
            
            window.customConfirm("Unarchive this pack? It will be visible and updateable again.", async (confirmed) => {
                if (!confirmed) return;
                
                const pathArgs = currentViewingPack.isPrivate 
                    ? ['artifacts', 'global_codex', 'users', currentViewingPack.authorId, 'scriptPacks', currentViewingPack.id]
                    : ['artifacts', 'global_codex', 'public', 'data', 'scriptPacks', currentViewingPack.id];
                    
                try {
                    await updateDoc(doc(db, ...pathArgs), {
                        isDeleted: false,
                        updateNotes: 'Pack unarchived by author.',
                        updatedAt: Date.now()
                    });
                    window.showToast("Pack restored.");
                    window.closePackDetails();
                    if (window.openImportModal) window.openImportModal();
                    if (window.openPacksModal) window.openPacksModal();
                } catch (e) {
                    console.error(e);
                    window.showToast("Failed to unarchive pack.");
                }
            });
        };

        window.executeAdminDelete = async () => {
            if (!window.pendingAdminDelete) return;
            const { type, id, name, targetUserId, isPrivate } = window.pendingAdminDelete;
            const reason = document.getElementById('admin-del-reason').value.trim();
            
            document.getElementById('admin-delete-prompt-modal').classList.add('hidden');
            window.showToast("Executing Admin Override...");

            try {
                if (reason && targetUserId) {
                    await updateDoc(doc(db, 'users', targetUserId), {
                        notifications: arrayUnion({
                            type: type === 'campaign' ? 'Realm Deleted' : 'Pack Deleted',
                            itemName: name,
                            message: reason,
                            timestamp: Date.now()
                        })
                    });
                }

                if (type === 'pack') {
                    const pathArgs = isPrivate 
                        ? ['artifacts', 'global_codex', 'users', targetUserId, 'scriptPacks', id]
                        : ['artifacts', 'global_codex', 'public', 'data', 'scriptPacks', id];
                    await deleteDoc(doc(db, ...pathArgs));
                    window.showToast("Pack permanently obliterated.");
                    window.closePackDetails();
                    window.openImportModal();
                }
            } catch (err) {
                console.error(err);
                window.showToast("Admin action failed.");
            }
            window.pendingAdminDelete = null;
        };

        window.openProgressionModal = () => {
            if (currentVocationFilter === 'All') return window.showToast("Select a specific vocation first.");
            
            const voc = VOC_KEYS.find(v => v.id === currentVocationFilter);
            const displayName = campaignSettings?.terms?.[voc.id] || voc.default;
            
            document.getElementById('progression-subtitle').innerText = displayName;
            
            const data = progressionTablesData[currentVocationFilter] || { customHeaders: ["RAGE", "DMG", "MASTERY"], rows: {} };
            
            const isDM = activeRole === 'dm';
            document.getElementById('progression-admin-actions').classList.toggle('hidden', !isDM);
            
            const h1 = document.getElementById('prog-h1');
            const h2 = document.getElementById('prog-h2');
            const h3 = document.getElementById('prog-h3');
            
            h1.value = data.customHeaders?.[0] || '';
            h2.value = data.customHeaders?.[1] || '';
            h3.value = data.customHeaders?.[2] || '';

            h1.disabled = !isDM; h2.disabled = !isDM; h3.disabled = !isDM;
            if (!isDM) {
                h1.parentElement.classList.toggle('hidden', !h1.value);
                h2.parentElement.classList.toggle('hidden', !h2.value);
                h3.parentElement.classList.toggle('hidden', !h3.value);
            } else {
                h1.parentElement.classList.remove('hidden');
                h2.parentElement.classList.remove('hidden');
                h3.parentElement.classList.remove('hidden');
            }

            const tbody = document.getElementById('progression-table-body');
            let html = '';
            
            for (let i = 1; i <= 20; i++) {
                const rData = data.rows?.[i] || {};
                const profVal = rData.prof || `+${Math.ceil(i/4) + 1}`;
                const featVal = rData.features || '';
                const c1Val = rData.c1 || '';
                const c2Val = rData.c2 || '';
                const c3Val = rData.c3 || '';
                
                let tdC1 = '', tdC2 = '', tdC3 = '';
                
                if (isDM) {
                    tdC1 = `<td class="py-2 px-1"><input type="text" id="prog-r${i}-c1" value="${c1Val}" class="prog-input text-gray-700" /></td>`;
                    tdC2 = `<td class="py-2 px-1"><input type="text" id="prog-r${i}-c2" value="${c2Val}" class="prog-input text-gray-700" /></td>`;
                    tdC3 = `<td class="py-2 px-1"><input type="text" id="prog-r${i}-c3" value="${c3Val}" class="prog-input text-gray-700" /></td>`;
                } else {
                    if (h1.value) tdC1 = `<td class="py-2 text-center text-gray-700">${c1Val}</td>`;
                    if (h2.value) tdC2 = `<td class="py-2 text-center text-gray-700">${c2Val}</td>`;
                    if (h3.value) tdC3 = `<td class="py-2 text-center text-gray-700">${c3Val}</td>`;
                }

                html += `
                <tr class="border-b border-gold/20 hover:bg-black/5 transition-colors">
                    <td class="py-2 text-center text-blood font-bold font-heading">${i}</td>
                    <td class="py-2 px-1 text-center font-bold text-gray-700">
                        ${isDM ? `<input type="text" id="prog-r${i}-prof" value="${profVal}" class="prog-input text-gray-700 text-center font-bold" />` : profVal}
                    </td>
                    <td class="py-2 px-1 text-left text-ink">
                        ${isDM ? `<input type="text" id="prog-r${i}-feat" value="${featVal}" class="prog-input prog-input-left text-ink" placeholder="Enter features..." />` : featVal}
                    </td>
                    ${tdC1}
                    ${tdC2}
                    ${tdC3}
                </tr>`;
            }
            
            tbody.innerHTML = html;
            document.getElementById('progression-modal').classList.remove('hidden');
        };

        window.saveProgressionTable = async () => {
            if (activeRole !== 'dm') return;
            if (currentVocationFilter === 'All') return;

            window.showToast("Saving Progression...");
            
            const data = {
                customHeaders: [
                    document.getElementById('prog-h1').value.trim(),
                    document.getElementById('prog-h2').value.trim(),
                    document.getElementById('prog-h3').value.trim()
                ],
                rows: {},
                updatedAt: Date.now()
            };
            
            for (let i = 1; i <= 20; i++) {
                data.rows[i] = {
                    prof: document.getElementById(`prog-r${i}-prof`).value.trim(),
                    features: document.getElementById(`prog-r${i}-feat`).value.trim(),
                    c1: document.getElementById(`prog-r${i}-c1`).value.trim(),
                    c2: document.getElementById(`prog-r${i}-c2`).value.trim(),
                    c3: document.getElementById(`prog-r${i}-c3`).value.trim()
                };
            }
            
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'progressionTables', currentVocationFilter), data);
                window.showToast("Progression Table Saved!");
                document.getElementById('progression-modal').classList.add('hidden');
            } catch (e) {
                console.error(e);
                window.showToast("Failed to save table.");
            }
        };

        window.openCreatePackModal = () => {
            if (activeRole !== 'dm') return;
            if (scripts.length === 0) return window.showToast("No records to bundle! Inscribe some first.");
            document.getElementById('pack-name').value = '';
            document.getElementById('pack-desc').value = '';
            document.getElementById('pack-vis').value = 'private';
            document.getElementById('create-pack-modal').classList.remove('hidden');
        };

        window.savePack = async () => {
            if (activeRole !== 'dm') return;
            if (scripts.length === 0) return window.showToast("Codex is empty.");
            
            const name = document.getElementById('pack-name').value.trim();
            const desc = document.getElementById('pack-desc').value.trim();
            const vis = document.getElementById('pack-vis').value;
            const icon = document.getElementById('pack-selected-icon').value || 'fa-solid fa-book-journal-whills';
            
            if (!name) return window.showToast("A pack name is required.");
            
            window.showToast("Publishing bundle...");
            document.getElementById('create-pack-modal').classList.add('hidden');

            const payload = {
                name: name,
                description: desc,
                visibility: vis,
                icon: icon,
                version: 1,
                downloads: 0,
                updateNotes: 'Initial publication.',
                authorId: currentUser.uid,
                authorName: currentUser.username || 'Unknown DM',
                scripts: scripts.map(s => {
                    const cleanScript = { ...s };
                    delete cleanScript.id; // Don't carry over the old doc IDs
                    return cleanScript;
                }),
                createdAt: Date.now()
            };

            try {
                if (vis === 'public') {
                    await addDoc(collection(db, 'artifacts', 'global_codex', 'public', 'data', 'scriptPacks'), payload);
                } else {
                    await addDoc(collection(db, 'artifacts', 'global_codex', 'users', currentUser.uid, 'scriptPacks'), payload);
                }
                window.showToast("Pack published to the archives!");
            } catch (err) {
                console.error(err);
                window.showToast("Failed to publish pack.");
            }
        };

        // --- AUTH & LISTENERS ---
        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                try { window.location.href = "index.html"; } catch(e) {
                    document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Authentication Required</h2>`;
                }
                return;
            }
            
            try {
                if (u.isAnonymous) {
                    currentUser = { uid: u.uid, username: "Guest Traveler", role: 'player' };
                } else {
                    const userDoc = await getDoc(doc(db, 'users', u.uid));
                    if (userDoc.exists()) currentUser = { uid: u.uid, ...userDoc.data(), email: u.email };
                    else currentUser = { uid: u.uid, username: u.displayName || 'Traveler', role: 'player', email: u.email };
                }

                activeRole = currentUser.role || 'player';
                adminModeActive = (currentUser.email === ADMIN_OWNER_EMAIL);

                if (appId !== "demo_campaign") {
                    const campDoc = await getDoc(doc(db, 'campaigns', appId));
                    if (campDoc.exists() && campDoc.data().name) {
                        const titleEl = document.getElementById('main-campaign-title-label');
                        if (titleEl && titleEl.innerText === 'Script Codex') titleEl.innerText = `${campDoc.data().name} Codex`;
                        document.title = `${campDoc.data().name} - Scripts`;
                    }
                }

                document.getElementById('user-display-name').innerText = currentUser.username;
                
                const isDM = activeRole === 'dm';
                document.getElementById('btn-create-script')?.classList.toggle('hidden', !isDM);
                document.getElementById('btn-wipe-codex')?.classList.toggle('hidden', !isDM);
                document.getElementById('btn-edit-definitions')?.classList.toggle('hidden', !isDM);
                document.getElementById('btn-campaign-settings')?.classList.toggle('hidden', !isDM);
                document.getElementById('btn-import')?.classList.toggle('hidden', !isDM);
                document.getElementById('btn-publish-pack')?.classList.toggle('hidden', !isDM);

                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');

                window.renderVocationTabs();
                window.renderLevelTabs();
                window.setLevelFilter(currentLevelFilter);
                
                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'campaignConfig', 'settings'), (docSnap) => {
                    if (docSnap.exists()) {
                        campaignSettings = docSnap.data();
                        const safeSet = (id, val) => { 
                            const el = document.getElementById(id); 
                            if (el && val) {
                                if (el.tagName === 'INPUT') el.value = val;
                                else el.innerText = val; 
                            }
                        };
                        const t = campaignSettings.terms || {};
                        
                        safeSet('nav-party', t.nav_party);
                        safeSet('nav-npcs', t.nav_npcs);
                        safeSet('nav-beasts', t.nav_beasts);
                        safeSet('nav-backpack', t.nav_backpack);
                        safeSet('nav-handbook', t.nav_handbook);
                        safeSet('nav-graveyard', t.nav_graveyard);
                        
                        safeSet('type-toggle-all', t.nav_all_records);
                        safeSet('type-toggle-features', t.nav_features);
                        safeSet('type-toggle-scriptcasting', t.nav_scripts);

                        const titleEl = document.getElementById('main-campaign-title-label');
                        if (titleEl) titleEl.innerText = t.book_scriptcodex || 'Script Codex';
                        
                        window.renderVocationTabs();
                        window.setLevelFilter(currentLevelFilter);
                    }
                }, (err) => console.error("Terminology Sync Error:", err));

                onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'campaignConfig', 'codexDefinitions'), (docSnap) => {
                    if (docSnap.exists()) customDefinitions = docSnap.data().text;
                    else customDefinitions = null;
                    window.renderDefinitions();
                }, (err) => console.error("Definitions Sync Error:", err));

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', DB_COLLECTION), (snap) => {
                    scripts = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.name > b.name ? 1 : -1));
                    window.renderScripts();

                    const targetScriptId = new URLSearchParams(window.location.search).get('targetScript');
                    if (targetScriptId && !window.targetScriptOpened) {
                        setTimeout(() => window.viewScript(targetScriptId), 200); 
                        window.targetScriptOpened = true; 
                    }
                }, (err) => console.error("Script Sync Error:", err));

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'characters'), (snap) => {
                    characters = snap.docs.map(d => ({id: d.id, ...d.data()}));
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'progressionTables'), (snap) => {
                    progressionTablesData = {};
                    snap.docs.forEach(d => {
                        progressionTablesData[d.id] = d.data();
                    });
                }, (err) => console.error("Progression Tables Sync Error:", err));

                const VOCATIONS_COLLECTION = `handbookVocations_${appId}`;
                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', VOCATIONS_COLLECTION), (snap) => {
                    vocationsData = snap.docs.map(d => ({id: d.id, ...d.data()}));
                });

                onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'gearArtifacts'), (snap) => {
                    materialComponents = snap.docs.map(d => d.data()).filter(item => item.visibility === 'public' && item.type === 'Material Component');
                });

            } catch (error) {
                console.error(error);
                document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Database Connection Failed</h2>`;
            }
        });
    </script>
</body>
</html>
