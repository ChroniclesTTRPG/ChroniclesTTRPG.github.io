<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chronicles Nexus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { 'parchment': '#f1e5c5', 'ink': '#2c1e16', 'blood': '#7a1b1b', 'gold': '#c5a059', 'wood': '#1a110b' }, fontFamily: { 'serif': ['Lora', 'serif'], 'heading': ['Cinzel', 'serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Lora', serif; background-color: #1a110b; background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M20 20.5V18H0v-2h20v-2H0v-2h20v-2H0V8h20V6H0V4h20V2H0V0h22v20h2V0h2v20h2V0h2v20h2V0h2v20h2V0h2v20h2v2H20v-1.5zM0 20h2v20H0V20zm4 0h2v20H4V20zm4 0h2v20H8V20zm4 0h2v20h-2V20zm4 0h2v20h-2V20zm4 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2zm0 4h20v2H20v-2z' fill='%232c1e16' fill-opacity='0.4' fill-rule='evenodd'/%3E%3C/svg%3E"); color: #f1e5c5; overflow-x: hidden; }
        .parchment-bg { background-color: #f1e5c5; background-image: radial-gradient(circle at center, transparent 0%, rgba(200, 170, 120, 0.3) 100%), url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.05' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100' height='100' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E"); box-shadow: inset 0 0 40px rgba(139, 90, 43, 0.4), 0 10px 30px rgba(0,0,0,0.7); border: 2px solid #c5a059; color: #2c1e16; }
        .fantasy-btn { background: linear-gradient(to bottom, #8a2b2b, #5a1111); color: #f1e5c5 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.5), inset 0 1px 3px rgba(255,255,255,0.2) !important; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .fantasy-btn:hover { background: linear-gradient(to bottom, #a33232, #7a1b1b); transform: translateY(-2px); box-shadow: 0 6px 12px rgba(0,0,0,0.6) !important; border-color: #e8cd87 !important; }
        .fantasy-btn-alt { background: linear-gradient(to bottom, #2c1e16, #1a110b); color: #c5a059 !important; border: 2px solid #c5a059 !important; font-family: 'Cinzel', serif; text-transform: uppercase; letter-spacing: 1px; transition: all 0.2s ease; }
        .fantasy-btn-alt:hover { background: linear-gradient(to bottom, #3d2a1f, #2c1e16); color: #f1e5c5 !important; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.6) !important; }
        .card { transition: all 0.2s; position: relative; border: 1px solid #555; background-color: rgba(0,0,0,0.7); cursor: pointer; }
        .card:hover { transform: translateY(-4px); border-color: #c5a059; box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.8), 0 0 15px rgba(197, 160, 89, 0.2); }
        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #2c1e16; border: 1px solid #c5a059; color: #f1e5c5; padding: 12px 24px; border-radius: 4px; z-index: 1000; pointer-events: none; opacity: 0; transition: opacity 0.3s; font-family: 'Cinzel', serif; box-shadow: 0 10px 20px rgba(0,0,0,0.8); }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 800; padding: 20px; backdrop-filter: blur(4px); }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center">

    <div id="toast" class="toast">Message</div>

    <!-- Initial Loading State -->
    <div id="initial-loading" class="flex flex-col items-center justify-center h-screen fade-in w-full text-center z-50 bg-wood">
        <i class="fa-solid fa-compass fa-spin text-6xl text-gray-500 mb-6"></i>
        <h2 class="font-heading text-2xl text-parchment animate-pulse">Charting the Realms...</h2>
    </div>

    <!-- MAIN DASHBOARD -->
    <div id="dashboard-screen" class="min-h-screen p-4 md:p-8 hidden w-full">
        <div class="max-w-6xl mx-auto">
            <!-- HEADER -->
            <header class="flex flex-col md:flex-row justify-between items-center mb-10 border-b border-gray-700 pb-6 gap-6 relative">
                <div class="absolute -bottom-1.5 left-0 w-full h-[3px] bg-gradient-to-r from-transparent via-gray-700 to-transparent opacity-50"></div>
                
                <div class="text-center md:text-left w-full md:w-auto">
                    <h1 class="text-4xl md:text-5xl text-gray-400 font-bold mb-1 font-heading tracking-tight leading-none drop-shadow-md">Chronicles</h1>
                    <div class="flex items-center justify-center md:justify-start gap-3 mt-2">
                        <p class="text-gray-500 text-xs uppercase tracking-[0.2em] font-bold font-heading">Campaign Nexus</p>
                        <div class="bg-black bg-opacity-60 border border-gray-700 px-3 py-1 rounded flex items-center gap-2 shadow-inner">
                            <span id="user-role-badge" class="bg-gray-600 text-white px-2 py-0.5 rounded text-[10px] uppercase tracking-widest font-heading font-black shadow-md">...</span>
                            <span id="user-display-name" class="text-[12px] font-black text-gray-300 uppercase tracking-widest font-heading">Traveler</span>
                            <button onclick="window.openUsernameModal()" class="text-gray-500 hover:text-gold transition-colors ml-1" title="Change Display Name">
                                <i class="fa-solid fa-pen text-[10px]"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-4 w-full md:w-auto items-center">
                    <!-- JOIN BY CODE (PLAYER ONLY) -->
                    <div id="player-actions" class="flex items-center bg-black bg-opacity-50 border border-gray-700 rounded overflow-hidden hidden">
                        <input type="text" id="invite-code-input" class="bg-transparent border-none text-gray-300 px-4 py-2 text-sm font-heading focus:outline-none w-40" placeholder="Invite Code...">
                        <button onclick="window.joinByCode()" class="bg-gray-800 hover:bg-gray-700 text-gold px-4 py-2 text-xs font-bold uppercase tracking-widest font-heading transition-colors border-l border-gray-700">Join</button>
                    </div>
                    <!-- CREATE CAMPAIGN (DM ONLY) -->
                    <button id="btn-create-campaign" onclick="document.getElementById('create-campaign-modal').classList.remove('hidden')" class="fantasy-btn px-6 py-2 rounded text-xs hidden">
                        <i class="fa-solid fa-plus mr-2"></i>New Realm
                    </button>
                    <!-- LOGOUT -->
                    <button onclick="window.logout()" class="text-[10px] font-black text-gray-500 hover:text-red-500 uppercase tracking-widest transition-colors font-heading ml-2 border border-gray-700 px-3 py-2 rounded bg-black bg-opacity-40"><i class="fa-solid fa-power-off mr-1"></i> Logout</button>
                </div>
            </header>

            <!-- MY ADVENTURES -->
            <div class="mb-10">
                <h2 class="text-xl font-heading text-gold mb-4 border-b border-gray-800 pb-2">My Adventures</h2>
                <div id="my-adventures-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Joined campaigns populate here -->
                </div>
            </div>

            <!-- PUBLIC REALMS -->
            <div class="mb-10">
                <h2 class="text-xl font-heading text-gray-500 mb-4 border-b border-gray-800 pb-2">Public Realms</h2>
                <div id="public-realms-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 opacity-90">
                    <!-- Public campaigns populate here -->
                </div>
            </div>

        </div>
    </div>

    <!-- UPDATE USERNAME MODAL (For old accounts) -->
    <div id="username-prompt-modal" class="modal-overlay hidden z-[900]">
        <div class="parchment-bg rounded-lg max-w-sm w-full p-8 shadow-2xl border-2 border-blood text-center relative">
            <button id="close-username-modal" onclick="document.getElementById('username-prompt-modal').classList.add('hidden')" class="absolute top-2 right-3 text-gray-500 hover:text-blood text-xl hidden"><i class="fa-solid fa-xmark"></i></button>
            <h2 class="font-heading text-2xl font-bold text-blood mb-2">Declare Thyself!</h2>
            <p id="username-modal-desc" class="text-sm font-serif text-ink mb-6 italic">The archives hold no record of your name, traveler. By what title shall the realm know you?</p>
            
            <input type="text" id="missing-username-input" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 text-lg font-serif outline-none placeholder-gray-500 mb-6 text-center" placeholder="e.g. Gandalf, Elara...">
            
            <button onclick="window.setUsername()" class="fantasy-btn w-full py-3 rounded text-sm font-bold">Save Identity</button>
        </div>
    </div>

    <!-- CREATE CAMPAIGN MODAL -->
    <div id="create-campaign-modal" class="modal-overlay hidden z-[800]">
        <div class="parchment-bg rounded-lg max-w-md w-full p-8 shadow-2xl border-2 border-blood">
            <h2 class="font-heading text-2xl font-bold text-blood text-center mb-6 border-b border-blood pb-2">Forge a New Realm</h2>
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-ink mb-1 font-heading">Campaign Name</label>
                    <input type="text" id="new-campaign-name" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 text-lg font-serif outline-none placeholder-gray-500" placeholder="e.g. The Shattered Isles">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-ink mb-1 font-heading mt-4">Description (Optional)</label>
                    <textarea id="new-campaign-desc" rows="2" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 font-serif outline-none resize-none" placeholder="A brief whisper of the lore..."></textarea>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-ink mb-1 font-heading mt-4">Visibility</label>
                    <select id="new-campaign-vis" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 font-serif outline-none">
                        <option value="private">Private (Invite Code Only)</option>
                        <option value="public">Public (Visible to all)</option>
                    </select>
                </div>
            </div>
            
            <div class="flex justify-end gap-4 mt-8">
                <button onclick="document.getElementById('create-campaign-modal').classList.add('hidden')" class="text-xs font-bold text-gray-600 uppercase tracking-widest hover:text-ink font-heading px-4">Cancel</button>
                <button onclick="window.createCampaign()" class="fantasy-btn px-6 py-2 rounded text-xs">Create</button>
            </div>
        </div>
    </div>

    <!-- EDIT CAMPAIGN MODAL -->
    <div id="edit-campaign-modal" class="modal-overlay hidden z-[800]">
        <div class="parchment-bg rounded-lg max-w-md w-full p-8 shadow-2xl border-2 border-blood">
            <h2 class="font-heading text-2xl font-bold text-blood text-center mb-6 border-b border-blood pb-2">Edit Realm</h2>
            <input type="hidden" id="edit-campaign-id">
            
            <div class="space-y-4 mb-6">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-ink mb-1 font-heading">Campaign Name</label>
                    <input type="text" id="edit-campaign-name" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 text-lg font-serif outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-ink mb-1 font-heading mt-4">Description</label>
                    <textarea id="edit-campaign-desc" rows="2" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 font-serif outline-none resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-ink mb-1 font-heading mt-4">Visibility</label>
                    <select id="edit-campaign-vis" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 font-serif outline-none">
                        <option value="private">Private (Invite Code Only)</option>
                        <option value="public">Public (Visible to all)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-ink mb-1 font-heading mt-4">Invite Code</label>
                    <div class="flex gap-2">
                        <input type="text" id="edit-campaign-code" class="w-full bg-transparent border-b-2 border-gray-400 focus:border-blood text-ink py-2 font-serif outline-none uppercase font-bold tracking-widest">
                        <button onclick="document.getElementById('edit-campaign-code').value = Math.random().toString(36).substring(2, 8).toUpperCase()" class="fantasy-btn-alt px-3 py-1 rounded text-xs" title="Generate New Code"><i class="fa-solid fa-arrows-rotate"></i></button>
                    </div>
                </div>
            </div>
            
            <div class="flex justify-end gap-4 mt-8">
                <button onclick="document.getElementById('edit-campaign-modal').classList.add('hidden')" class="text-xs font-bold text-gray-600 uppercase tracking-widest hover:text-ink font-heading px-4">Cancel</button>
                <button onclick="window.saveCampaignEdit()" class="fantasy-btn px-6 py-2 rounded text-xs">Save</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, updateDoc, setDoc, onSnapshot, getDoc, addDoc, query, where, getDocs, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- CORE UI FUNCTIONS ---
        window.showToast = (m) => { 
            const t = document.getElementById('toast'); 
            if(t){ t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0, 4000); } 
        };

        // --- FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCKRN5dfi4og69_D8ZAvV1BQfwCK_f2uis",
            authDomain: "dndcampaigns-f3d48.firebaseapp.com",
            projectId: "dndcampaigns-f3d48",
            storageBucket: "dndcampaigns-f3d48.firebasestorage.app",
            messagingSenderId: "1074491536795",
            appId: "1:1074491536795:web:56211729489be776d79d3e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let allCampaigns = [];

        // Generate Random Invite Code
        function generateCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // Generate Card HTML
        function createCampaignCard(camp, isMine) {
            const d = document.createElement('div');
            d.className = "bg-black bg-opacity-60 rounded-lg card p-5 flex flex-col justify-between group";
            
            const isDM = currentUser && camp.dmId === currentUser.uid;
            
            // Interaction logic based on Role
            d.onclick = () => {
                if (isMine) {
                    try { window.location.href = `characters.html?id=${camp.id}`; } 
                    catch(e) { window.showToast("Redirects disabled in preview window."); }
                } else if (currentUser.role === 'player' && camp.visibility === 'public') {
                    window.joinPublicCampaign(camp.id, camp.name);
                } else if (currentUser.role === 'dm' && !isMine) {
                    window.showToast("Dungeon Masters only manage their own realms.");
                }
            };

            let badges = '';
            
            if (isDM) badges += `<span class="bg-blood text-white px-2 py-0.5 rounded text-[8px] uppercase tracking-widest font-heading font-black shadow-md">DM</span>`;
            else if (isMine) badges += `<span class="bg-green-700 text-white px-2 py-0.5 rounded text-[8px] uppercase tracking-widest font-heading font-black shadow-md">Joined</span>`;

            if (camp.visibility === 'private') badges += `<span class="bg-gray-800 text-gray-400 border border-gray-600 px-2 py-0.5 rounded text-[8px] uppercase tracking-widest font-heading shadow-md ml-1"><i class="fa-solid fa-lock text-[7px] mr-1"></i>Private</span>`;

            // DM TOOLS (Edit & Delete) AND PLAYER TOOLS (Leave)
            const editBtn = isDM ? `<button onclick="event.stopPropagation(); window.openEditCampaign('${camp.id}')" class="text-gold hover:text-yellow-400 transition-colors ml-3" title="Edit Realm"><i class="fa-solid fa-pen"></i></button>` : '';
            const deleteBtn = isDM ? `<button onclick="event.stopPropagation(); window.deleteCampaign('${camp.id}', '${camp.name.replace(/'/g, "\\'")}')" class="text-blood hover:text-red-400 transition-colors ml-3" title="Delete Realm"><i class="fa-solid fa-trash-can"></i></button>` : '';
            const leaveBtn = (!isDM && isMine) ? `<button onclick="event.stopPropagation(); window.leaveCampaign('${camp.id}', '${camp.name.replace(/'/g, "\\'")}')" class="text-gray-400 hover:text-parchment transition-colors ml-3" title="Leave Realm"><i class="fa-solid fa-right-from-bracket"></i></button>` : '';

            const descText = camp.description ? `<p class="text-xs text-gray-400 font-serif mb-4 line-clamp-2">${camp.description}</p>` : '';

            // Footer Text logic
            let footerText = 'Click to enter realm';
            if (isDM) footerText = `Code: <span class="text-white bg-gray-800 px-1 rounded">${camp.inviteCode}</span>`;
            else if (!isMine && currentUser.role === 'player') footerText = '<span class="text-gold group-hover:text-yellow-300 transition-colors"><i class="fa-solid fa-door-open mr-1"></i> Click to Join Realm</span>';
            else if (!isMine && currentUser.role === 'dm') footerText = '<span class="text-gray-600">Locked to other DMs</span>';

            d.innerHTML = `
                <div>
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-xl font-heading font-bold text-gold drop-shadow">${camp.name}</h3>
                        <div class="flex items-center">
                            <div class="flex gap-1">${badges}</div>
                            ${editBtn}
                            ${deleteBtn}
                            ${leaveBtn}
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 font-serif italic mb-2">Run by ${camp.dmName || 'Unknown DM'}</p>
                    ${descText}
                </div>
                <div class="border-t border-gray-700 pt-3 flex justify-between items-center mt-2">
                    <span class="text-[9px] text-gray-500 uppercase font-heading tracking-widest">${footerText}</span>
                    <i class="fa-solid fa-chevron-right ${!isMine && currentUser.role === 'dm' ? 'text-gray-800' : 'text-gray-600 group-hover:text-gold transition-colors'} text-xs"></i>
                </div>
            `;
            return d;
        }

        // Render Grids
        function renderCampaigns() {
            const myGrid = document.getElementById('my-adventures-grid');
            const pubGrid = document.getElementById('public-realms-grid');
            
            myGrid.innerHTML = ''; 
            pubGrid.innerHTML = '';

            const joinedIds = currentUser?.joinedCampaigns || [];

            allCampaigns.forEach(camp => {
                const isMine = joinedIds.includes(camp.id) || camp.dmId === currentUser.uid;
                
                if (isMine) {
                    myGrid.appendChild(createCampaignCard(camp, true));
                } else if (camp.visibility === 'public') {
                    pubGrid.appendChild(createCampaignCard(camp, false));
                }
            });

            if (myGrid.children.length === 0) {
                myGrid.innerHTML = `<div class="col-span-full py-4 text-center border border-dashed border-gray-800 rounded bg-black bg-opacity-30"><p class="text-gray-500 text-xs italic font-serif">You have not joined any adventures yet.</p></div>`;
            }
            if (pubGrid.children.length === 0) {
                pubGrid.innerHTML = `<div class="col-span-full py-4 text-center border border-dashed border-gray-800 rounded bg-black bg-opacity-30"><p class="text-gray-500 text-xs italic font-serif">No public realms are currently available.</p></div>`;
            }
        }

        // --- ACTIONS ---

        // Open Username Modal
        window.openUsernameModal = () => {
            const isForced = !currentUser.username || currentUser.username.trim() === '';
            document.getElementById('missing-username-input').value = currentUser.username || '';
            document.getElementById('close-username-modal').classList.toggle('hidden', isForced);
            document.getElementById('username-modal-desc').innerText = isForced 
                ? "The archives hold no record of your name, traveler. By what title shall the realm know you?"
                : "By what new title shall the realm know you?";
            document.getElementById('username-prompt-modal').classList.remove('hidden');
        };

        // Fix missing username
        window.setUsername = async () => {
            const newName = document.getElementById('missing-username-input').value.trim();
            if (!newName) return window.showToast("Please enter a name.");
            
            try {
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    username: newName
                });
                currentUser.username = newName;
                document.getElementById('user-display-name').innerText = newName;
                document.getElementById('username-prompt-modal').classList.add('hidden');
                window.showToast("Identity updated!");
            } catch (err) {
                console.error(err);
                window.showToast("Failed to save name.");
            }
        };

        window.joinByCode = async () => {
            const code = document.getElementById('invite-code-input').value.trim().toUpperCase();
            if (!code) return window.showToast("Enter a code first.");

            try {
                const q = query(collection(db, 'campaigns'), where('inviteCode', '==', code));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    window.showToast("Invalid Invite Code.");
                    return;
                }

                const camp = snap.docs[0];

                if (currentUser && currentUser.uid) {
                    await updateDoc(doc(db, 'users', currentUser.uid), {
                        joinedCampaigns: arrayUnion(camp.id)
                    });
                }

                window.showToast(`Joined ${camp.data().name}!`);
                
                setTimeout(() => {
                    try { window.location.href = `characters.html?id=${camp.id}`; } 
                    catch(e) { window.showToast("Redirect disabled in preview."); }
                }, 1000);

            } catch (err) {
                console.error(err);
                window.showToast("Error joining campaign.");
            }
        };

        // Quick join for public campaigns
        window.joinPublicCampaign = async (id, name) => {
            if (!currentUser || currentUser.role !== 'player') return;
            try {
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    joinedCampaigns: arrayUnion(id)
                });
                window.showToast(`Joined the realm of ${name}!`);
            } catch(e) {
                console.error(e);
                window.showToast("Failed to join realm.");
            }
        };

        window.createCampaign = async () => {
            if (!currentUser || currentUser.role !== 'dm') return;
            const name = document.getElementById('new-campaign-name').value.trim();
            const desc = document.getElementById('new-campaign-desc').value.trim();
            const vis = document.getElementById('new-campaign-vis').value;
            
            if (!name) return window.showToast("Name is required.");

            try {
                const newRef = await addDoc(collection(db, 'campaigns'), {
                    name: name,
                    description: desc,
                    visibility: vis,
                    dmId: currentUser.uid,
                    dmName: currentUser.username,
                    inviteCode: generateCode(),
                    createdAt: Date.now()
                });

                await updateDoc(doc(db, 'users', currentUser.uid), {
                    joinedCampaigns: arrayUnion(newRef.id)
                });

                document.getElementById('create-campaign-modal').classList.add('hidden');
                document.getElementById('new-campaign-name').value = '';
                document.getElementById('new-campaign-desc').value = '';
                window.showToast("Realm Forged Successfully!");

            } catch (err) {
                console.error(err);
                window.showToast("Failed to forge realm.");
            }
        };

        // Open Edit Modal
        window.openEditCampaign = (id) => {
            const camp = allCampaigns.find(c => c.id === id);
            if (!camp) return;

            document.getElementById('edit-campaign-id').value = camp.id;
            document.getElementById('edit-campaign-name').value = camp.name || '';
            document.getElementById('edit-campaign-desc').value = camp.description || '';
            document.getElementById('edit-campaign-vis').value = camp.visibility || 'private';
            document.getElementById('edit-campaign-code').value = camp.inviteCode || '';

            document.getElementById('edit-campaign-modal').classList.remove('hidden');
        };

        // Save Edit Changes
        window.saveCampaignEdit = async () => {
            const id = document.getElementById('edit-campaign-id').value;
            const name = document.getElementById('edit-campaign-name').value.trim();
            const desc = document.getElementById('edit-campaign-desc').value.trim();
            const vis = document.getElementById('edit-campaign-vis').value;
            const code = document.getElementById('edit-campaign-code').value.trim().toUpperCase();

            if (!name) return window.showToast("Name is required.");
            if (!code) return window.showToast("Invite code is required.");

            try {
                await updateDoc(doc(db, 'campaigns', id), {
                    name: name,
                    description: desc,
                    visibility: vis,
                    inviteCode: code
                });
                document.getElementById('edit-campaign-modal').classList.add('hidden');
                window.showToast("Realm Updated!");
            } catch (err) {
                console.error(err);
                window.showToast("Failed to update realm.");
            }
        };

        // Delete Campaign
        window.deleteCampaign = async (id, name) => {
            if (!confirm(`Are you sure you want to permanently destroy the realm of "${name}"? This cannot be undone.`)) return;
            
            try {
                await deleteDoc(doc(db, 'campaigns', id));
                window.showToast("Realm destroyed.");
            } catch (err) {
                console.error(err);
                window.showToast("Failed to destroy realm.");
            }
        };

        // Leave Campaign (Players Only)
        window.leaveCampaign = async (id, name) => {
            if (!confirm(`Are you sure you want to leave the realm of "${name}"? You will need the invite code to return.`)) return;
            
            try {
                await updateDoc(doc(db, 'users', currentUser.uid), {
                    joinedCampaigns: arrayRemove(id)
                });
                window.showToast("You have left the realm.");
            } catch (err) {
                console.error(err);
                window.showToast("Failed to leave realm.");
            }
        };

        window.logout = () => {
            signOut(auth).then(() => {
                try { window.location.href = "index.html"; } catch(e) {}
            });
        };

        // --- AUTH & DATA SYNC ---
        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                try { window.location.href = "index.html"; } catch(e) {
                    document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Authentication Required</h2>`;
                }
                return;
            }
            
            try {
                const userDocRef = doc(db, 'users', u.uid);
                const userDocSnap = await getDoc(userDocRef);

                if (userDocSnap.exists()) {
                    currentUser = { uid: u.uid, ...userDocSnap.data() };
                } else {
                    currentUser = { 
                        uid: u.uid, 
                        username: u.displayName || '', 
                        role: 'player',
                        joinedCampaigns: []
                    };
                    await setDoc(userDocRef, currentUser);
                }

                if (!currentUser.joinedCampaigns) {
                    currentUser.joinedCampaigns = [];
                }

                // --- SMART USERNAME RESOLUTION & UI ENFORCEMENT ---
                
                // 1. If username is literally empty (old account), trigger the prompt
                if (!currentUser.username || currentUser.username.trim() === '') {
                    window.openUsernameModal();
                }

                // 2. Set display text. If empty, fallback to email prefix so it doesn't just say "Traveler"
                let display = currentUser.username;
                if (!display && u.email) {
                    display = u.email.split('@')[0]; // Grabs 'rub.wa00'
                } else if (!display) {
                    display = 'Traveler';
                }
                document.getElementById('user-display-name').innerText = display;

                // 3. UI Toggles based on Role
                const roleBadge = document.getElementById('user-role-badge');
                const createBtn = document.getElementById('btn-create-campaign');
                const playerActions = document.getElementById('player-actions');

                if (currentUser.role === 'dm') {
                    roleBadge.innerText = 'DM';
                    roleBadge.className = 'bg-blood text-white px-2 py-0.5 rounded text-[10px] uppercase tracking-widest font-heading font-black shadow-md';
                    createBtn.classList.remove('hidden');
                    playerActions.classList.add('hidden');
                } else {
                    roleBadge.innerText = 'PLAYER';
                    roleBadge.className = 'bg-gray-600 text-white px-2 py-0.5 rounded text-[10px] uppercase tracking-widest font-heading font-black shadow-md';
                    createBtn.classList.add('hidden');
                    playerActions.classList.remove('hidden');
                }

                // Hide loading overlay
                document.getElementById('initial-loading').classList.add('hidden');
                document.getElementById('dashboard-screen').classList.remove('hidden');

                // Listen for Campaign updates
                onSnapshot(collection(db, 'campaigns'), (snap) => {
                    allCampaigns = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    renderCampaigns();
                });

                // Listen for User Profile updates
                onSnapshot(userDocRef, (userSnap) => {
                    if (userSnap.exists()) {
                        currentUser = { uid: u.uid, ...userSnap.data() };
                        if (!currentUser.joinedCampaigns) currentUser.joinedCampaigns = [];
                        
                        // Keep display name actively updated in case they just saved it in the modal
                        let updatedDisplay = currentUser.username || (u.email ? u.email.split('@')[0] : 'Traveler');
                        document.getElementById('user-display-name').innerText = updatedDisplay;
                        
                        renderCampaigns();
                    }
                });

            } catch (error) {
                console.error(error);
                document.getElementById('initial-loading').innerHTML = `<h2 class="font-heading text-2xl text-blood">Database Connection Failed</h2>`;
            }
        });
    </script>
</body>
</html>
